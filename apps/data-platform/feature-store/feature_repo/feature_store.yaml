project: recsys
provider: local
registry: data/registry.db
entity_key_serialization_version: 2

# Feast core offline store for point-in-time historical retrieval.
# Feast stores feature values in PostgreSQL and Redis; lakehouse tables are upstream only.
offline_store:
  type: postgres
  host: feature-postgres.recsys-dataflow.svc.cluster.local
  port: 5432
  database: feature_store
  db_schema: feature_store
  user: feast
  password: feast
  sslmode: disable

online_store:
  type: redis
  connection_string: redis:6379
