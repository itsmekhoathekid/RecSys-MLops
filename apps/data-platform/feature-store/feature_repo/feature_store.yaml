project: recsys
provider: local
registry: data/registry.db
entity_key_serialization_version: 2

# Feast 0.64 does not ship a native Apache Iceberg offline-store provider.
# The authoritative offline store for this project is Apache Iceberg under
# s3://recsys-offline-feature-store/warehouse/feature_store. Spark exports the
# Iceberg feature views below into this Feast offline view before `feast apply`
# and `feast materialize-incremental`.
offline_store:
  type: file

online_store:
  type: redis
  connection_string: redis:6379
