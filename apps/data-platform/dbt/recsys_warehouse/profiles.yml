recsys_warehouse:
  target: local
  outputs:
    local:
      type: postgres
      host: "{{ env_var('WAREHOUSE_POSTGRES_HOST', 'warehouse-postgres') }}"
      port: "{{ env_var('WAREHOUSE_POSTGRES_PORT', 5432) | int }}"
      user: "{{ env_var('WAREHOUSE_POSTGRES_USER', 'recsys') }}"
      password: "{{ env_var('WAREHOUSE_POSTGRES_PASSWORD', 'recsys') }}"
      dbname: "{{ env_var('WAREHOUSE_POSTGRES_DB', 'recsys_warehouse') }}"
      schema: public
      threads: 4

