{{- if .Values.istio.enabled }}
{{- range .Values.istio.namespaces }}
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: recsys-strict-mtls
  namespace: {{ . }}
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: recsys-default-deny
  namespace: {{ . }}
spec: {}
{{- end }}
{{- end }}
