{{- if and .Values.istio.enabled (has "recsys-dataflow" .Values.istio.namespaces) }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: recsys-dataflow-minio-s3-ingress
  namespace: recsys-dataflow
spec:
  podSelector:
    matchLabels:
      app: data-platform-minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: recsys-dataflow
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kubeflow
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: datahub
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9000
{{- end }}
