{{- if .Values.externalSecrets.enabled }}
{{- $store := .Values.secretStore.name -}}
{{- $refresh := .Values.externalSecrets.refreshInterval -}}
{{- range $name, $secret := .Values.externalSecrets }}
{{- if kindIs "map" $secret }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret.secretName }}
  namespace: {{ $secret.namespace }}
  labels:
    app.kubernetes.io/part-of: recsys-mlops
    recsys.ai/security-scope: {{ $name | quote }}
spec:
  refreshInterval: {{ $refresh | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $store }}
  target:
    name: {{ $secret.secretName }}
    creationPolicy: {{ $.Values.externalSecrets.creationPolicy | default "Owner" }}
    {{- with $secret.annotations }}
    template:
      metadata:
        annotations:
          {{- toYaml . | nindent 10 }}
    {{- end }}
  dataFrom:
    - extract:
        key: {{ $secret.vaultPath | quote }}
    {{- range $additionalPath := ($secret.additionalVaultPaths | default list) }}
    - extract:
        key: {{ $additionalPath | quote }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
