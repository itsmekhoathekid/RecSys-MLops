storageClassName: standard-rwo

images:
  pullPolicy: IfNotPresent

sourcePostgres:
  storage: 20Gi

kafkaConnect:
  istioInject: "true"

airflowPostgres:
  storage: 5Gi

minio:
  storage: 20Gi

airflow:
  schedule: manual

dataSetup:
  generatorConfig: configs/local/data_generator_e2e_2k.yaml
  generatorRunId: test_2k_seed42
  sparkBatchConfig: configs/local/spark_batch_e2e_2k.yaml
  realtimeLimitPerTable: "1000"

spark:
  driverMemory: 2g
  driverMemoryOverhead: 768m
  driverCores: "1"
  driverRequestCores: 100m
  executorInstances: "1"
  executorMemory: 4g
  executorMemoryOverhead: 1g
  executorCores: "1"
  executorRequestCores: 100m
  sqlShufflePartitions: "16"

realtimeProducer:
  replicas: 1
  intervalSeconds: "1"
  eventsPerTick: "10"
  maxEvents: "0"
  nUsers: "1000"
  nProducts: "5000"

flinkTaskManager:
  replicas: 1

flink:
  istioInject: "true"

redis:
  istioInject: "true"

realtimeFlinkConsumer:
  replicas: 1
  istioInject: "true"
  parallelism: "1"
  checkpointIntervalSeconds: "120"
  offlineStoreEnabled: true

drift:
  sampleRows: "5000"
