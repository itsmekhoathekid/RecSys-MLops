storageClassName: standard-rwo

images:
  pullPolicy: IfNotPresent

sourcePostgres:
  storage: 20Gi

kafkaConnect:
  istioInject: "true"

airflowPostgres:
  storage: 5Gi

minio:
  storage: 20Gi

airflow:
  schedule: manual

dataSetup:
  generatorConfig: configs/local/data_generator_e2e_2k.yaml
  generatorRunId: test_2k_seed42
  sparkBatchConfig: configs/local/spark_batch_e2e_2k.yaml
  realtimeLimitPerTable: "1000"

spark:
  driverMemory: 2g
  driverMemoryOverhead: 1g
  driverCores: "1"
  driverRequestCores: 100m
  executorInstances: "1"
  executorMemory: 1536m
  executorMemoryOverhead: 1536m
  executorCores: "1"
  executorRequestCores: 100m
  dynamicAllocation:
    enabled: false
    shuffleTrackingEnabled: true
    minExecutors: "1"
    initialExecutors: "1"
    maxExecutors: "1"
    executorIdleTimeout: 60s
    schedulerBacklogTimeout: 1s
    sustainedSchedulerBacklogTimeout: 1s
  sqlShufflePartitions: "16"

realtimeProducer:
  replicas: 0

flinkTaskManager:
  # Isolate the online and offline streaming workloads across two TaskManagers.
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 6Gi
    limits:
      cpu: "2"
      memory: 10Gi

flink:
  istioInject: "true"
  # One slot per TaskManager guarantees the online and offline jobs are isolated.
  taskSlots: "1"

flinkAutoscaler:
  taskManagerHpa:
    # Keep two warm workers and allow burst traffic to scale out to four.
    maxReplicas: 4

redis:
  istioInject: "true"

realtimeFlinkConsumer:
  replicas: 1
  istioInject: "true"
  parallelism: "1"
  checkpointIntervalSeconds: "120"
  offlineStoreEnabled: true
  online:
    # A fresh GCP cluster has no committed consumer offsets yet. Starting from
    # earliest also avoids the PyFlink committed-offset enum bridge issue.
    startingOffsets: earliest

streaming:
  # The proof workload backdates events by 45-180 minutes; one hour yields
  # both accepted-late and post-cleanup events for the three UI counters.
  allowedLatenessSeconds: 3600

drift:
  sampleRows: "5000"
