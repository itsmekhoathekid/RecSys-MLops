storageClassName: standard-rwo

images:
  pullPolicy: IfNotPresent

sourcePostgres:
  storage: 20Gi

kafkaConnect:
  istioInject: "true"

airflowPostgres:
  storage: 5Gi

minio:
  storage: 20Gi

airflow:
  schedule: manual

dataSetup:
  generatorConfig: configs/local/data_generator_e2e_2k.yaml
  generatorRunId: test_2k_seed42
  sparkBatchConfig: configs/local/spark_batch_e2e_2k.yaml
  realtimeLimitPerTable: "1000"

spark:
  driverMemory: 2g
  driverMemoryOverhead: 768m
  driverCores: "1"
  driverRequestCores: 100m
  executorInstances: "1"
  executorMemory: 4g
  executorMemoryOverhead: 1g
  executorCores: "1"
  executorRequestCores: 100m
  sqlShufflePartitions: "16"

realtimeProducer:
  replicas: 1

flinkTaskManager:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 6Gi
    limits:
      cpu: "2"
      memory: 10Gi

flink:
  istioInject: "true"
  taskSlots: "2"

redis:
  istioInject: "true"

realtimeFlinkConsumer:
  replicas: 1
  istioInject: "true"
  parallelism: "2"
  checkpointIntervalSeconds: "120"
  offlineStoreEnabled: true

drift:
  sampleRows: "5000"
