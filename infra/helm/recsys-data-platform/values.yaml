namespace:
  create: true
  name: recsys-dataflow

images:
  dataflowCli: recsys-dataflow-cli:local
  spark: recsys-spark:local
  flink: recsys-flink:local
  minio: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
  minioClient: minio/mc:RELEASE.2025-04-16T18-13-26Z
  postgres: postgres:16
  redis: redis:latest
  zookeeper: confluentinc/cp-zookeeper:7.5.0
  kafka: confluentinc/cp-kafka:7.5.0
  kafkaConnect: recsys-kafka-connect:local
  airflow: recsys-airflow:local
  pullPolicy: IfNotPresent

storageClassName: ""

sourcePostgres:
  name: source-postgres
  database: recsys
  user: recsys
  password: ""
  storage: 5Gi

airflowPostgres:
  name: airflow-postgres
  database: airflow
  user: airflow
  password: ""
  storage: 5Gi

minio:
  name: data-platform-minio
  endpoint: http://data-platform-minio:9000
  rootUser: minio
  rootPassword: ""
  lakeBucket: recsys-lakehouse
  offlineFeatureBucket: recsys-offline-feature-store
  storage: 20Gi
  service:
    apiPort: 9000
    consolePort: 9001

lakehouse:
  catalog: recsys
  lakehouseNamespace: lakehouse
  offlineFeatureCatalog: recsys_features
  featureNamespace: feature_store

dataSetup:
  generatorConfig: configs/local/data_generator_e2e_1k.yaml
  generatorRunId: test_1k_seed42
  sparkBatchConfig: configs/local/spark_batch_e2e_1k.yaml
  realtimeLimitPerTable: "200"

e2e:
  realtimeEnabled: "true"
  datahubIngestEnabled: "false"

spark:
  k8sMaster: k8s://https://kubernetes.default.svc
  serviceAccountName: default
  driverMemory: 768m
  driverMemoryOverhead: 128m
  driverCores: "1"
  executorInstances: "1"
  executorMemory: 768m
  executorMemoryOverhead: 128m
  executorCores: "1"
  sqlShufflePartitions: "4"
  connectionTimeout: "60000"
  requestTimeout: "180000"

kafka:
  name: kafka
  bootstrapServers: kafka:29092

kafkaConnect:
  name: kafka-connect
  port: 8083

redis:
  name: redis
  port: 6379

flinkTaskManager:
  replicas: 1

realtimeProducer:
  enabled: true
  name: realtime-event-producer
  replicas: 1
  intervalSeconds: "2"
  eventsPerTick: "5"
  maxEvents: "1000"
  nUsers: "20"
  nProducts: "50"

realtimeFlinkConsumer:
  enabled: true
  name: realtime-flink-consumer
  replicas: 1
  topic: cdc.behavior_events
  groupId: recsys-flink-realtime
  minEvents: "0"
  maxEvents: "0"
  parallelism: "1"
  maxHistoryLength: "50"
  progressLogEvents: "100"
  checkpointIntervalSeconds: "30"
  offlineStoreEnabled: true

realtimeCdcConnector:
  enabled: true
  tableIncludeList: public.behavior_events
  snapshotMode: never
  slotName: recsys_slot_e2e

airflow:
  dagsPath: /opt/recsys/apps/data-platform/src/orchestration/airflow/dags
  schedule: "@daily"

drift:
  currentRoot: "s3a://recsys-offline-feature-store/warehouse/feature_store"
  baselinePath: "s3://recsys-offline-feature-store/monitoring/offline_feature_drift/reference_baseline"
  currentDays: "7"
  sampleRows: "1000"
  featureTables: "user_aggregate_features,item_features,ml_bst_training"
  bootstrapBaseline: "true"

streaming:
  watermarkDelayMinutes: 60
  qualityWindowSeconds: 60
  burstThresholdEventCount: 500
  stateTtlSeconds: 604800
  dedupStateTtlSeconds: 86400

observability:
  enabled: true
  pushgatewayUrl: http://recsys-pushgateway.observability.svc.cluster.local:9091
  otelEndpoint: http://recsys-tempo.observability.svc.cluster.local:4317
  kfpEndpoint: http://ml-pipeline.kubeflow.svc.cluster.local:8888
  kfpExperimentName: recsys-observability-retrain
  kfpPipelinePackagePath: /opt/recsys/infra/kubeflow/compiled/bst_training_pipeline.yaml
  retrainOnDrift: "true"
  retrainPsiThreshold: "0.15"

secret:
  create: false
