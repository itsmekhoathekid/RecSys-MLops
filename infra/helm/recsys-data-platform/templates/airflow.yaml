apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      containers:
        - name: airflow-webserver
          image: {{ .Values.images.airflow }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["bash", "-lc"]
          args:
            - >-
              airflow db migrate;
              airflow users create --username admin --password admin --firstname RecSys --lastname Admin --role Admin --email admin@example.com || true;
              airflow webserver
          env:
            - name: AIRFLOW_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: recsys-data-platform-secret
                  key: AIRFLOW_POSTGRES_USER
            - name: AIRFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recsys-data-platform-secret
                  key: AIRFLOW_POSTGRES_PASSWORD
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(AIRFLOW_POSTGRES_USER):$(AIRFLOW_POSTGRES_PASSWORD)@{{ .Values.airflowPostgres.name }}:5432/{{ .Values.airflowPostgres.database }}"
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: {{ .Values.airflow.dagsPath | quote }}
            - name: AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT
              value: "900"
            - name: AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT
              value: "900"
            - name: AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT
              value: "900"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      containers:
        - name: airflow-scheduler
          image: {{ .Values.images.airflow }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["bash", "-lc"]
          args:
            - >-
              timeout 120 airflow db check-migrations --migration-wait-timeout 120 || true;
              airflow scheduler
          env:
            - name: AIRFLOW_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: recsys-data-platform-secret
                  key: AIRFLOW_POSTGRES_USER
            - name: AIRFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recsys-data-platform-secret
                  key: AIRFLOW_POSTGRES_PASSWORD
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: "postgresql+psycopg2://$(AIRFLOW_POSTGRES_USER):$(AIRFLOW_POSTGRES_PASSWORD)@{{ .Values.airflowPostgres.name }}:5432/{{ .Values.airflowPostgres.database }}"
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: {{ .Values.airflow.dagsPath | quote }}
            - name: AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT
              value: "900"
            - name: AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT
              value: "900"
            - name: AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT
              value: "900"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: airflow-webserver
