apiVersion: batch/v1
kind: Job
metadata:
  name: init-data-platform-minio
  namespace: {{ .Values.namespace.name }}
spec:
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: {{ .Values.images.minioClient }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set data-platform "$MINIO_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 5
              done
              mc mb --ignore-existing "data-platform/{{ .Values.minio.lakeBucket }}"
              mc mb --ignore-existing "data-platform/{{ .Values.minio.offlineFeatureBucket }}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-source-schema
  namespace: {{ .Values.namespace.name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        sidecar.istio.io/inject: "true"
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: init-source-schema
          image: {{ .Values.images.dataflowCli }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["bash", "-lc"]
          args:
            - |
              cleanup() {
                status=$?
                python -c "import urllib.request; req=urllib.request.Request('http://127.0.0.1:15020/quitquitquit', method='POST'); urllib.request.urlopen(req, timeout=2).read()" >/dev/null 2>&1 || true
                exit "$status"
              }
              trap cleanup EXIT
              until PYTHONPATH=/opt/recsys/apps/data-platform/data-generator/src:/opt/recsys \
                python infra/docker/scripts/init_postgres_schema.py; do
                sleep 5
              done
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
{{- if .Values.realtimeCdcConnector.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: register-realtime-cdc-connector
  namespace: {{ .Values.namespace.name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      annotations:
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
        sidecar.istio.io/inject: "true"
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: register-debezium
          image: {{ .Values.images.dataflowCli }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["bash", "-lc"]
          args:
            - |
              cleanup() {
                status=$?
                python -c "import urllib.request; req=urllib.request.Request('http://127.0.0.1:15020/quitquitquit', method='POST'); urllib.request.urlopen(req, timeout=2).read()" >/dev/null 2>&1 || true
                exit "$status"
              }
              trap cleanup EXIT
              python -m ingest.register_k8s_connectors --connector debezium --wait-timeout-seconds 900
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
{{- end }}
