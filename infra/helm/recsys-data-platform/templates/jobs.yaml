apiVersion: batch/v1
kind: Job
metadata:
  name: init-data-platform-minio
  namespace: {{ .Values.namespace.name }}
spec:
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: {{ .Values.images.minioClient }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
          command: ["/bin/sh", "-c"]
          args:
            - |
              until mc alias set data-platform "$MINIO_ENDPOINT" "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 5
              done
              mc mb --ignore-existing "data-platform/{{ .Values.minio.lakeBucket }}"
              mc mb --ignore-existing "data-platform/{{ .Values.minio.featureStoreBucket }}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-warehouse
  namespace: {{ .Values.namespace.name }}
spec:
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: init-warehouse
          image: {{ .Values.images.dataflowCli }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["python", "-m", "warehouse.init_warehouse"]
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
---
apiVersion: batch/v1
kind: Job
metadata:
  name: init-source-schema
  namespace: {{ .Values.namespace.name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: init-source-schema
          image: {{ .Values.images.dataflowCli }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["bash", "-lc"]
          args:
            - |
              until PYTHONPATH=/opt/recsys/apps/data-platform/data-generator/src:/opt/recsys \
                python infra/docker/scripts/init_postgres_schema.py; do
                sleep 5
              done
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
---
apiVersion: batch/v1
kind: Job
metadata:
  name: register-realtime-cdc-connector
  namespace: {{ .Values.namespace.name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: OnFailure
      containers:
        - name: register-debezium
          image: {{ .Values.images.dataflowCli }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["python", "-m", "ingest.register_k8s_connectors"]
          args: ["--connector", "debezium", "--wait-timeout-seconds", "300"]
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
