{{- if .Values.realtimeProducer.enabled }}
{{- $producerRollout := default (dict) .Values.realtimeProducer.rollout }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.realtimeProducer.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: {{ .Values.realtimeProducer.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ get $producerRollout "maxSurge" | default 0 }}
      maxUnavailable: {{ get $producerRollout "maxUnavailable" | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.realtimeProducer.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.realtimeProducer.name }}
    spec:
      enableServiceLinks: false
      containers:
        - name: realtime-event-producer
          image: {{ .Values.images.dataflowCli }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              until PYTHONPATH=/opt/recsys/apps/data-platform/data-generator/src:/opt/recsys \
                /opt/venv/bin/python infra/docker/scripts/init_postgres_schema.py; do
                sleep 5
              done
              PYTHONPATH=/opt/recsys/apps/data-platform/data-generator/src:/opt/recsys \
              /opt/venv/bin/python apps/data-platform/data-generator/src/scripts/run_realtime_postgres_producer.py
              if [ "${REALTIME_MAX_EVENTS:-0}" != "0" ]; then
                echo "Realtime producer reached REALTIME_MAX_EVENTS=${REALTIME_MAX_EVENTS}; keeping pod alive to avoid deployment restart loops."
                sleep infinity
              fi
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
{{- end }}
