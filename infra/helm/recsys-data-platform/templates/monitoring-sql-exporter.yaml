{{- if and .Values.observability.enabled .Values.observability.sqlExporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.observability.sqlExporter.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.observability.sqlExporter.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.observability.sqlExporter.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.observability.sqlExporter.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.observability.sqlExporter.port | quote }}
    spec:
      containers:
        - name: sql-exporter
          image: {{ .Values.images.dataflowCli }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["python", "-m", "monitoring.sql_exporter"]
          env:
            - name: SQL_EXPORTER_HTTP_PORT
              value: {{ .Values.observability.sqlExporter.port | quote }}
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
          ports:
            - name: metrics
              containerPort: {{ .Values.observability.sqlExporter.port }}
{{- end }}
---
{{- if and .Values.observability.enabled .Values.observability.sqlExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.observability.sqlExporter.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.observability.sqlExporter.name }}
spec:
  selector:
    app: {{ .Values.observability.sqlExporter.name }}
  ports:
    - name: metrics
      port: {{ .Values.observability.sqlExporter.port }}
      targetPort: metrics
{{- end }}
