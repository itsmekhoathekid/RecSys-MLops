apiVersion: v1
kind: ConfigMap
metadata:
  name: recsys-data-platform-config
  namespace: {{ .Values.namespace.name }}
data:
  PYTHONPATH: /opt/flink/opt/python:/opt/recsys/apps/data-platform/src:/opt/recsys
  DATA_PLATFORM_MINIO_ENDPOINT: {{ .Values.minio.endpoint | quote }}
  MINIO_ENDPOINT: {{ .Values.minio.endpoint | quote }}
  AWS_DEFAULT_REGION: us-east-1
  LAKE_BUCKET: {{ .Values.minio.lakeBucket | quote }}
  OFFLINE_FEATURE_BUCKET: {{ .Values.minio.offlineFeatureBucket | quote }}
  LAKEHOUSE_WAREHOUSE: "s3a://{{ .Values.minio.lakeBucket }}/warehouse"
  ICEBERG_CATALOG: {{ .Values.lakehouse.catalog | quote }}
  ICEBERG_LAKEHOUSE_NAMESPACE: {{ .Values.lakehouse.lakehouseNamespace | quote }}
  OFFLINE_FEATURE_CATALOG: {{ .Values.lakehouse.offlineFeatureCatalog | quote }}
  OFFLINE_FEATURE_STORE_WAREHOUSE: "s3a://{{ .Values.minio.offlineFeatureBucket }}/warehouse"
  ICEBERG_FEATURE_NAMESPACE: {{ .Values.lakehouse.featureNamespace | quote }}
  OFFLINE_FEATURE_STORE_URI: "s3a://{{ .Values.minio.offlineFeatureBucket }}/warehouse/{{ .Values.lakehouse.featureNamespace }}"
  POSTGRES_HOST: {{ .Values.sourcePostgres.name | quote }}
  POSTGRES_PORT: "5432"
  POSTGRES_DB: {{ .Values.sourcePostgres.database | quote }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
  KAFKA_CONNECT_URL: "http://{{ .Values.kafkaConnect.name }}:{{ .Values.kafkaConnect.port }}"
  REDIS_HOST: {{ .Values.redis.name | quote }}
  REDIS_PORT: {{ .Values.redis.port | quote }}
  OFFLINE_STORE_ENABLED: "true"
  OFFLINE_FEATURE_DRIFT_REPORT_PATH: "s3://{{ .Values.minio.offlineFeatureBucket }}/monitoring/offline_feature_drift/report.json"
  PUSHGATEWAY_URL: {{ .Values.observability.pushgatewayUrl | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otelEndpoint | quote }}
  DATAHUB_GMS_URL: "http://datahub-datahub-gms.datahub.svc.cluster.local:8080"
  KFP_ENDPOINT: {{ .Values.observability.kfpEndpoint | quote }}
  KFP_EXPERIMENT_NAME: {{ .Values.observability.kfpExperimentName | quote }}
  KFP_PIPELINE_PACKAGE_PATH: {{ .Values.observability.kfpPipelinePackagePath | quote }}
  RETRAIN_ON_DRIFT: {{ .Values.observability.retrainOnDrift | quote }}
  RETRAIN_PSI_THRESHOLD: {{ .Values.observability.retrainPsiThreshold | quote }}
  RECSYS_JSON_LOGS: "1"
  REALTIME_INTERVAL_SECONDS: {{ .Values.realtimeProducer.intervalSeconds | quote }}
  REALTIME_EVENTS_PER_TICK: {{ .Values.realtimeProducer.eventsPerTick | quote }}
  REALTIME_MAX_EVENTS: {{ .Values.realtimeProducer.maxEvents | quote }}
  REALTIME_N_USERS: {{ .Values.realtimeProducer.nUsers | quote }}
  REALTIME_N_PRODUCTS: {{ .Values.realtimeProducer.nProducts | quote }}
  REALTIME_STREAM_TOPIC: {{ .Values.realtimeFlinkConsumer.topic | quote }}
  REALTIME_STREAM_GROUP_ID: {{ .Values.realtimeFlinkConsumer.groupId | quote }}
  REALTIME_STREAM_MIN_EVENTS: {{ .Values.realtimeFlinkConsumer.minEvents | quote }}
  REALTIME_STREAM_MAX_EVENTS: {{ .Values.realtimeFlinkConsumer.maxEvents | quote }}
  FLINK_PARALLELISM: {{ .Values.realtimeFlinkConsumer.parallelism | quote }}
  REALTIME_STREAM_MAX_HISTORY_LENGTH: {{ .Values.realtimeFlinkConsumer.maxHistoryLength | quote }}
  STREAM_PROGRESS_LOG_EVENTS: {{ .Values.realtimeFlinkConsumer.progressLogEvents | quote }}
  STREAM_CHECKPOINT_INTERVAL_SECONDS: {{ .Values.realtimeFlinkConsumer.checkpointIntervalSeconds | quote }}
  STREAM_WATERMARK_DELAY_MINUTES: {{ .Values.streaming.watermarkDelayMinutes | quote }}
  STREAM_QUALITY_WINDOW_SECONDS: {{ .Values.streaming.qualityWindowSeconds | quote }}
  STREAM_BURST_THRESHOLD_EVENT_COUNT: {{ .Values.streaming.burstThresholdEventCount | quote }}
  STREAM_STATE_TTL_SECONDS: {{ .Values.streaming.stateTtlSeconds | quote }}
  STREAM_DEDUP_STATE_TTL_SECONDS: {{ .Values.streaming.dedupStateTtlSeconds | quote }}
