apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - port: 2181
      targetPort: 2181
  selector:
    app: zookeeper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      enableServiceLinks: false
      containers:
        - name: zookeeper
          image: {{ .Values.images.zookeeper }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafka.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - name: broker
      port: 29092
      targetPort: 29092
  selector:
    app: {{ .Values.kafka.name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.kafka.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.kafka.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.kafka.name }}
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: {{ .Values.images.kafka }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://{{ .Values.kafka.name }}.{{ .Values.namespace.name }}.svc.cluster.local:29092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_NUM_PARTITIONS
              value: {{ .Values.kafka.topicPartitions | quote }}
          ports:
            - containerPort: 29092
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafkaConnect.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - name: rest
      port: {{ .Values.kafkaConnect.port }}
      targetPort: 8083
  selector:
    app: {{ .Values.kafkaConnect.name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.kafkaConnect.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.kafkaConnect.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.kafkaConnect.name }}
      annotations:
        sidecar.istio.io/inject: {{ .Values.kafkaConnect.istioInject | quote }}
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka-connect
          image: {{ .Values.images.kafkaConnect }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xms256m -Xmx512m"
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: {{ .Values.kafkaConnect.name | quote }}
            - name: CONNECT_GROUP_ID
              value: recsys-connect
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: recsys_connect_configs
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: recsys_connect_offsets
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: recsys_connect_status
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_PLUGIN_PATH
              value: /usr/share/java,/usr/share/confluent-hub-components
            - name: CONNECT_CONNECTOR_CLIENT_CONFIG_OVERRIDE_POLICY
              value: All
          ports:
            - containerPort: 8083
---
apiVersion: v1
