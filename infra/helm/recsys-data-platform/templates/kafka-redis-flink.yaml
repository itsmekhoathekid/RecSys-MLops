apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - port: 2181
      targetPort: 2181
  selector:
    app: zookeeper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      enableServiceLinks: false
      containers:
        - name: zookeeper
          image: {{ .Values.images.zookeeper }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
          ports:
            - containerPort: 2181
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafka.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - name: broker
      port: 29092
      targetPort: 29092
  selector:
    app: {{ .Values.kafka.name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.kafka.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.kafka.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.kafka.name }}
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: {{ .Values.images.kafka }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:29092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          ports:
            - containerPort: 29092
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kafkaConnect.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - name: rest
      port: {{ .Values.kafkaConnect.port }}
      targetPort: 8083
  selector:
    app: {{ .Values.kafkaConnect.name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.kafkaConnect.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.kafkaConnect.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.kafkaConnect.name }}
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka-connect
          image: {{ .Values.images.kafkaConnect }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xms256m -Xmx512m"
            - name: CONNECT_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: CONNECT_REST_ADVERTISED_HOST_NAME
              value: {{ .Values.kafkaConnect.name | quote }}
            - name: CONNECT_GROUP_ID
              value: recsys-connect
            - name: CONNECT_CONFIG_STORAGE_TOPIC
              value: recsys_connect_configs
            - name: CONNECT_OFFSET_STORAGE_TOPIC
              value: recsys_connect_offsets
            - name: CONNECT_STATUS_STORAGE_TOPIC
              value: recsys_connect_status
            - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: CONNECT_KEY_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
            - name: CONNECT_PLUGIN_PATH
              value: /usr/share/java,/usr/share/confluent-hub-components
            - name: CONNECT_CONNECTOR_CLIENT_CONFIG_OVERRIDE_POLICY
              value: All
          ports:
            - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: 6379
  selector:
    app: {{ .Values.redis.name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.redis.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.redis.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.redis.name }}
    spec:
      enableServiceLinks: false
      containers:
        - name: redis
          image: {{ .Values.images.redis }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - name: ui
      port: 8081
      targetPort: 8081
    - name: rpc
      port: 6123
      targetPort: 6123
    - name: blob
      port: 6124
      targetPort: 6124
  selector:
    app: flink-jobmanager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-jobmanager
  template:
    metadata:
      labels:
        app: flink-jobmanager
    spec:
      enableServiceLinks: false
      containers:
        - name: flink-jobmanager
          image: {{ .Values.images.flink }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["bash", "-lc"]
          args:
            - |
              if [ ! -x /opt/flink/opt/python/pyflink/bin/pyflink-udf-runner.sh ]; then
                python3 -m zipfile -e /opt/flink/opt/python/pyflink.zip /opt/flink/opt/python
                chmod +x /opt/flink/opt/python/pyflink/bin/*.sh
              fi
              if [ ! -d /opt/flink/opt/python/py4j ]; then
                python3 -m zipfile -e /opt/flink/opt/python/py4j-0.10.9.7-src.zip /opt/flink/opt/python
              fi
              /docker-entrypoint.sh jobmanager
          env:
            - name: FLINK_PROPERTIES
              value: "jobmanager.rpc.address: flink-jobmanager\nblob.server.port: 6124"
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
          ports:
            - containerPort: 8081
            - containerPort: 6123
            - containerPort: 6124
---
apiVersion: apps/v1
kind: Deployment
metadata:
