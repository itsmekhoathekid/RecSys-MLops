apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.sourcePostgres.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  selector:
    app: {{ .Values.sourcePostgres.name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.sourcePostgres.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  serviceName: {{ .Values.sourcePostgres.name }}
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.sourcePostgres.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.sourcePostgres.name }}
    spec:
      enableServiceLinks: false
      containers:
        - name: postgres
          image: {{ .Values.images.postgres }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          args: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=8", "-c", "max_wal_senders=8"]
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_DB
              value: {{ .Values.sourcePostgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.sourcePostgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: recsys-data-platform-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.storageClassName }}
        storageClassName: {{ .Values.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.sourcePostgres.storage }}
---
