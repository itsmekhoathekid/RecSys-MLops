apiVersion: v1
kind: ServiceAccount
metadata:
  name: recsys-prometheus
  namespace: {{ .Values.namespace.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: recsys-prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: recsys-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: recsys-prometheus
subjects:
  - kind: ServiceAccount
    name: recsys-prometheus
    namespace: {{ .Values.namespace.name }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recsys-prometheus-config
  namespace: {{ .Values.namespace.name }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/rules/*.yml
    scrape_configs:
      - job_name: recsys-api-serving
        metrics_path: /metrics
        static_configs:
          - targets: ["recsys-api-serving.{{ .Values.targets.apiNamespace }}.svc.cluster.local:80"]
            labels:
              service: recsys-api-serving
      - job_name: recsys-pushgateway
        honor_labels: true
        static_configs:
          - targets: ["recsys-pushgateway.{{ .Values.namespace.name }}.svc.cluster.local:9091"]
      - job_name: recsys-monitoring-sql-exporter
        static_configs:
          - targets: ["monitoring-sql-exporter.{{ .Values.targets.dataNamespace }}.svc.cluster.local:9102"]
      - job_name: recsys-redis-exporter
        static_configs:
          - targets: ["redis-exporter.{{ .Values.namespace.name }}.svc.cluster.local:9121"]
      - job_name: recsys-source-postgres-exporter
        static_configs:
          - targets: ["source-postgres-exporter.{{ .Values.namespace.name }}.svc.cluster.local:9187"]
      - job_name: recsys-warehouse-postgres-exporter
        static_configs:
          - targets: ["warehouse-postgres-exporter.{{ .Values.namespace.name }}.svc.cluster.local:9187"]
      - job_name: kubernetes-cadvisor
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
      - job_name: kubernetes-kubelet
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
      - job_name: recsys-kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - {{ .Values.targets.apiNamespace }}
                - {{ .Values.targets.dataNamespace }}
                - {{ .Values.targets.kserveNamespace }}
                - {{ .Values.targets.mlflowNamespace }}
                - {{ .Values.targets.kubeflowNamespace }}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recsys-prometheus-rules
  namespace: {{ .Values.namespace.name }}
data:
  recsys-alerts.yml: |
    groups:
      - name: recsys-observability
        rules:
          - alert: RecSysApiHighFailureRate
            expr: sum(rate(recsys_api_failures_total[5m])) > 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: RecSys API is returning failures.
          - alert: RecSysFeatureDriftDetected
            expr: min(recsys_ml_feature_drift_passed) == 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: Offline feature drift threshold failed.
          - alert: RecSysDataQualityFailed
            expr: min(recsys_data_quality_passed) == 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: Data quality validation failed.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-prometheus
  namespace: {{ .Values.namespace.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recsys-prometheus
  template:
    metadata:
      labels:
        app: recsys-prometheus
    spec:
      serviceAccountName: recsys-prometheus
      containers:
        - name: prometheus
          image: {{ .Values.images.prometheus }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time={{ .Values.retention.prometheus }}
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: recsys-prometheus-config
        - name: rules
          configMap:
            name: recsys-prometheus-rules
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: recsys-prometheus
  namespace: {{ .Values.namespace.name }}
spec:
  selector:
    app: recsys-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
