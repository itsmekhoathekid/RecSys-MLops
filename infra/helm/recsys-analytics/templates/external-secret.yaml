{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recsys-analytics-secret
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: recsys-mlops
    recsys.ai/security-scope: analytics
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.storeName }}
  target:
    name: recsys-analytics-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.remoteKey | quote }}
{{- end }}
