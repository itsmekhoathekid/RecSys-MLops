apiVersion: v1
kind: Service
metadata:
  name: recsys-analytics-superset
  namespace: {{ .Values.namespace }}
spec:
  selector: {app: recsys-analytics-superset}
  ports: [{name: http, port: 8088, targetPort: 8088}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-analytics-superset
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels: {app: recsys-analytics-superset}
  template:
    metadata:
      labels: {app: recsys-analytics-superset}
      annotations:
        sidecar.istio.io/inject: "false"
        checksum/config: {{ include (print $.Template.BasePath "/superset-config.yaml") . | sha256sum }}
    spec:
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      initContainers:
        - name: superset-init
          image: {{ .Values.images.superset | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/bash", "-ec"]
          args:
            - |
              superset db upgrade
              superset fab create-admin \
                --username "$SUPERSET_ADMIN_USERNAME" \
                --firstname RecSys --lastname Admin \
                --email admin@recsys.local \
                --password "$SUPERSET_ADMIN_PASSWORD" || true
              superset init
              superset set-database-uri \
                --database_name RecSysAnalytics \
                --uri trino://superset@recsys-analytics-trino:8080/analytics/recsys
          envFrom: [{secretRef: {name: recsys-analytics-secret}}]
          env: [{name: SUPERSET_CONFIG_PATH, value: /app/pythonpath/superset_config.py}]
          volumeMounts: [{name: config, mountPath: /app/pythonpath/superset_config.py, subPath: superset_config.py}]
      containers:
        - name: superset
          image: {{ .Values.images.superset | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          command: ["/bin/bash", "-ec"]
          args: ["gunicorn --bind 0.0.0.0:8088 --workers 2 --timeout 120 'superset.app:create_app()'"]
          envFrom: [{secretRef: {name: recsys-analytics-secret}}]
          env: [{name: SUPERSET_CONFIG_PATH, value: /app/pythonpath/superset_config.py}]
          ports: [{name: http, containerPort: 8088}]
          resources: {{ toYaml .Values.resources.superset | nindent 12 }}
          readinessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts: [{name: config, mountPath: /app/pythonpath/superset_config.py, subPath: superset_config.py}]
      volumes:
        - name: config
          configMap: {name: recsys-analytics-superset-config}
