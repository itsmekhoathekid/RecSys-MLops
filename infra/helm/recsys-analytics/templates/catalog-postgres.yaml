apiVersion: v1
kind: Service
metadata:
  name: recsys-analytics-catalog-postgres
  namespace: {{ .Values.namespace }}
spec:
  selector: {app: recsys-analytics-catalog-postgres}
  ports:
    - {name: postgres, port: 5432, targetPort: 5432}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: recsys-analytics-catalog-postgres
  namespace: {{ .Values.namespace }}
spec:
  serviceName: recsys-analytics-catalog-postgres
  replicas: 1
  selector:
    matchLabels: {app: recsys-analytics-catalog-postgres}
  template:
    metadata:
      labels: {app: recsys-analytics-catalog-postgres}
      annotations: {sidecar.istio.io/inject: "false"}
    spec:
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: postgres
          image: {{ .Values.images.postgres | quote }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
            - {name: POSTGRES_DB, valueFrom: {secretKeyRef: {name: recsys-analytics-secret, key: CATALOG_POSTGRES_DB}}}
            - {name: POSTGRES_USER, valueFrom: {secretKeyRef: {name: recsys-analytics-secret, key: CATALOG_POSTGRES_USER}}}
            - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: recsys-analytics-secret, key: CATALOG_POSTGRES_PASSWORD}}}
          ports: [{name: postgres, containerPort: 5432}]
          readinessProbe:
            exec: {command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts: [{name: data, mountPath: /var/lib/postgresql/data}]
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        storageClassName: {{ .Values.catalog.storageClassName }}
        accessModes: [ReadWriteOnce]
        resources: {requests: {storage: {{ .Values.catalog.storage }}}}
