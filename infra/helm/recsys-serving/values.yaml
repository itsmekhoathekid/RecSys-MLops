kserve:
  enabled: true
  namespace:
    create: true
    name: kserve-triton-inference
  servingRuntime:
    create: true
    name: recsys-tritonserver
    image: nvcr.io/nvidia/tritonserver:23.05-py3
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "3"
        memory: 6Gi
  inferenceService:
    name: recsys-bst-triton
    candidateName: recsys-bst-triton-candidate
    deploymentMode: RawDeployment
    storageUri: s3://recsys-model-store/triton/bst/latest
    candidateStorageUri: ""
    retainCandidate: false
  grpcService:
    name: recsys-bst-triton-grpc
    candidateName: recsys-bst-triton-candidate-grpc
    port: 9000
    targetPort: 9000
    selector:
      app: isvc.recsys-bst-triton-predictor
    candidateSelector:
      app: isvc.recsys-bst-triton-candidate-predictor
  serviceAccount:
    name: recsys-kserve-minio
  secret:
    name: recsys-kserve-minio
    create: false
    minioEndpoint: minio.experiment-tracking.svc.cluster.local:9000
    minioUseHttps: "0"
    minioRegion: us-east-1
    accessKeyId: minio
    secretAccessKey: ""
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "3"
      memory: 6Gi
  nodeSelector: {}
  tolerations: []
  sharedMemory:
    sizeLimit: 256Mi

api:
  namespace:
    create: true
    name: api-serving
  name: recsys-api-serving
  image: recsys-api-serving:local
  imagePullPolicy: IfNotPresent
  command: ["uvicorn"]
  args: ["inference_api:app", "--host", "0.0.0.0", "--port", "8080"]
  replicas: 2
  rollout:
    maxSurge: 1
    maxUnavailable: 0
    minReadySeconds: 10
    progressDeadlineSeconds: 120
  service:
    port: 80
    targetPort: 8080
  config:
    tritonUrl: recsys-bst-triton-predictor.kserve-triton-inference.svc.cluster.local:9000
    tritonModelName: bst_ensemble
    featureApiUrl: http://recsys-online-feature-api.api-serving.svc.cluster.local
    featureApiTimeoutSeconds: "20"
    redisHost: redis.recsys-dataflow.svc.cluster.local
    redisPort: "6379"
    defaultTopK: "10"
    modelVersion: latest
    forceNotReady: "0"
    allowFeatureFallback: "0"
    modelItemNum: "22700"
    modelCategoryNum: "30"
    modelBrandNum: "740"
    modelPriceBucketNum: "10"
    modelEventTypeNum: "3"
    modelTimeBucketNum: "9"
    jsonLogs: "1"
    otelEnabled: "1"
    otelServiceName: recsys-api-serving
    otelEndpoint: http://recsys-tempo.observability.svc.cluster.local:4317
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  istio:
    proxyCPU: 50m
    proxyMemory: 64Mi
  nodeSelector: {}
  tolerations: []

featureApi:
  enabled: true
  name: recsys-online-feature-api
  image: recsys-api-serving:local
  imagePullPolicy: IfNotPresent
  command: ["uvicorn"]
  args: ["feature_api:app", "--host", "0.0.0.0", "--port", "8080"]
  replicas: 1
  rollout:
    maxSurge: 1
    maxUnavailable: 0
    minReadySeconds: 10
    progressDeadlineSeconds: 120
  service:
    port: 80
    targetPort: 8080
  config:
    redisHost: redis.recsys-dataflow.svc.cluster.local
    redisPort: "6379"
    feastRepoPath: /opt/recsys/apps/data-platform/feature-store/feature_repo
    feastRuntimeRepoPath: /opt/recsys/recsys-feast-feature-repo
    feastApplyOnStartup: "1"
    warmupOnStartup: "1"
    forceNotReady: "0"
    allowFeatureFallback: "0"
    jsonLogs: "1"
    otelEnabled: "1"
    otelServiceName: recsys-online-feature-api
    otelEndpoint: http://recsys-tempo.observability.svc.cluster.local:4317
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  istio:
    proxyCPU: 50m
    proxyMemory: 64Mi
  nodeSelector: {}
  tolerations: []

autoscaling:
  http:
    enabled: true
    externalScalerAddress: keda-add-ons-http-external-scaler.keda:9090
    api:
      enabled: false
      name: recsys-api-serving-http
      host: recsys-api-serving.local
      pathPrefix: /
      minReplicas: 2
      maxReplicas: 3
      scaledownPeriod: 120
      requestRate:
        targetValue: 5
        window: 30s
        granularity: 1s
    kserve:
      enabled: false
      name: recsys-bst-triton-http
      host: recsys-bst-triton.local
      deploymentName: recsys-bst-triton-predictor
      serviceName: recsys-bst-triton-http
      targetServiceSelector:
        app: isvc.recsys-bst-triton-predictor
      pathPrefix: /
      minReplicas: 1
      maxReplicas: 3
      scaledownPeriod: 180
      requestRate:
        targetValue: 3
        window: 30s
        granularity: 1s
    limits:
      cpu: 500m
      memory: 512Mi
  prometheus:
    enabled: true
    serverAddress: http://recsys-prometheus.observability.svc.cluster.local:9090
    pollingInterval: 10
    cooldownPeriod: 120
    restoreToOriginalReplicaCount: true
    api:
      enabled: true
      name: recsys-api-serving-prometheus
      hpaName: recsys-api-serving
      serviceLabel: recsys-api-serving
      route: /recommendations
      method: POST
      minReplicas: 1
      maxReplicas: 3
      requestRate:
        targetValue: "5"
        activationThreshold: "1"
        window: 1m
      latency:
        targetValue: "0.20"
        activationThreshold: "0.05"
        window: 1m
    featureApi:
      enabled: true
      name: recsys-online-feature-api-prometheus
      hpaName: recsys-online-feature-api
      serviceLabel: recsys-online-feature-api
      route: /online-features
      method: POST
      minReplicas: 1
      maxReplicas: 3
      requestRate:
        targetValue: "5"
        activationThreshold: "1"
        window: 1m
      latency:
        targetValue: "0.12"
        activationThreshold: "0.03"
        window: 1m
  kserveResource:
    enabled: true
    name: recsys-bst-triton-resource
    candidateName: recsys-bst-triton-candidate-resource
    deploymentName: recsys-bst-triton-predictor
    candidateDeploymentName: recsys-bst-triton-candidate-predictor
    minReplicas: 1
    maxReplicas: 3
    pollingInterval: 15
    cooldownPeriod: 180
    restoreToOriginalReplicaCount: true
    hpaName: recsys-bst-triton-predictor
    candidateHpaName: recsys-bst-triton-candidate-predictor
    cpu:
      enabled: true
      metricType: Utilization
      value: "50"
    memory:
      enabled: false
      metricType: Utilization
      value: "70"

observability:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s

abTest:
  enabled: false
  experimentId: ""
  candidateWeightPercent: 0
  controlModelVersion: latest
  candidateModelVersion: ""
  controlTritonUrl: recsys-bst-triton-predictor.kserve-triton-inference.svc.cluster.local:9000
  candidateTritonUrl: recsys-bst-triton-candidate-predictor.kserve-triton-inference.svc.cluster.local:9000

shadow:
  enabled: false
  samplePercent: 100
  timeoutMs: 1000
  queueSize: 100
  maxConcurrency: 4
