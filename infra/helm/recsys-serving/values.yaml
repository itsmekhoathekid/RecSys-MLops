kserve:
  enabled: true
  namespace:
    create: true
    name: kserve-triton-inference
  servingRuntime:
    create: false
    name: kserve-tritonserver
    image: nvcr.io/nvidia/tritonserver:23.05-py3
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "3"
        memory: 6Gi
  inferenceService:
    name: recsys-bst-triton
    candidateName: recsys-bst-triton-candidate
    deploymentMode: RawDeployment
    storageUri: s3://recsys-model-store/triton/bst/latest
    candidateStorageUri: ""
  grpcService:
    name: recsys-bst-triton-grpc
    candidateName: recsys-bst-triton-candidate-grpc
    port: 9000
    targetPort: 9000
    selector:
      app: isvc.recsys-bst-triton-predictor
    candidateSelector:
      app: isvc.recsys-bst-triton-candidate-predictor
  serviceAccount:
    name: recsys-kserve-minio
  secret:
    name: recsys-kserve-minio
    create: false
    minioEndpoint: minio.experiment-tracking.svc.cluster.local:9000
    minioUseHttps: "0"
    minioRegion: us-east-1
    accessKeyId: minio
    secretAccessKey: ""
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "3"
      memory: 6Gi
  sharedMemory:
    sizeLimit: 256Mi

api:
  namespace:
    create: true
    name: api-serving
  name: recsys-api-serving
  image: recsys-api-serving:local
  imagePullPolicy: IfNotPresent
  replicas: 2
  rollout:
    maxSurge: 1
    maxUnavailable: 0
    minReadySeconds: 10
    progressDeadlineSeconds: 120
  service:
    port: 80
    targetPort: 8080
  config:
    tritonUrl: recsys-bst-triton-grpc.kserve-triton-inference.svc.cluster.local:9000
    tritonModelName: bst_ensemble
    redisHost: redis.recsys-dataflow.svc.cluster.local
    redisPort: "6379"
    defaultTopK: "10"
    modelVersion: latest
    forceNotReady: "0"
    allowFeatureFallback: "0"
    modelItemNum: "22700"
    modelCategoryNum: "30"
    modelBrandNum: "740"
    modelPriceBucketNum: "10"
    modelEventTypeNum: "3"
    modelTimeBucketNum: "9"
    jsonLogs: "1"
    otelEnabled: "1"
    otelServiceName: recsys-api-serving
    otelEndpoint: http://recsys-tempo.observability.svc.cluster.local:4317
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

autoscaling:
  http:
    enabled: true
    externalScalerAddress: keda-add-ons-http-external-scaler.keda:9090
    api:
      enabled: true
      name: recsys-api-serving-http
      host: recsys-api-serving.local
      pathPrefix: /
      minReplicas: 1
      maxReplicas: 5
      scaledownPeriod: 120
      requestRate:
        targetValue: 5
        window: 30s
        granularity: 1s
    kserve:
      enabled: false
      name: recsys-bst-triton-http
      host: recsys-bst-triton.local
      deploymentName: recsys-bst-triton-predictor
      serviceName: recsys-bst-triton-http
      targetServiceSelector:
        app: isvc.recsys-bst-triton-predictor
      pathPrefix: /
      minReplicas: 1
      maxReplicas: 3
      scaledownPeriod: 180
      requestRate:
        targetValue: 3
        window: 30s
        granularity: 1s
    limits:
      cpu: 500m
      memory: 512Mi
  kserveResource:
    enabled: true
    name: recsys-bst-triton-resource
    candidateName: recsys-bst-triton-candidate-resource
    deploymentName: recsys-bst-triton-predictor
    candidateDeploymentName: recsys-bst-triton-candidate-predictor
    minReplicas: 1
    maxReplicas: 3
    pollingInterval: 15
    cooldownPeriod: 180
    restoreToOriginalReplicaCount: true
    hpaName: recsys-bst-triton-predictor
    candidateHpaName: recsys-bst-triton-candidate-predictor
    cpu:
      enabled: true
      metricType: Utilization
      value: "50"
    memory:
      enabled: false
      metricType: Utilization
      value: "70"

observability:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 15s

abTest:
  enabled: false
  experimentId: ""
  candidateWeightPercent: 0
  controlModelVersion: latest
  candidateModelVersion: ""
  controlTritonUrl: recsys-bst-triton-grpc.kserve-triton-inference.svc.cluster.local:9000
  candidateTritonUrl: recsys-bst-triton-candidate-grpc.kserve-triton-inference.svc.cluster.local:9000
