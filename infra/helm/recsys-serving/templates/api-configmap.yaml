apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.api.name }}
  namespace: {{ .Values.api.namespace.name }}
data:
  TRITON_URL: {{ .Values.api.config.tritonUrl | quote }}
  TRITON_MODEL_NAME: {{ .Values.api.config.tritonModelName | quote }}
  FEATURE_API_URL: {{ .Values.api.config.featureApiUrl | quote }}
  FEATURE_API_TIMEOUT_SECONDS: {{ .Values.api.config.featureApiTimeoutSeconds | quote }}
  REDIS_HOST: {{ .Values.api.config.redisHost | quote }}
  REDIS_PORT: {{ .Values.api.config.redisPort | quote }}
  DEFAULT_TOP_K: {{ .Values.api.config.defaultTopK | quote }}
  MODEL_VERSION: {{ .Values.api.config.modelVersion | quote }}
  AB_TEST_ENABLED: {{ ternary "1" "0" .Values.abTest.enabled | quote }}
  AB_EXPERIMENT_ID: {{ .Values.abTest.experimentId | quote }}
  AB_CANDIDATE_WEIGHT_PERCENT: {{ .Values.abTest.candidateWeightPercent | quote }}
  AB_CONTROL_MODEL_VERSION: {{ .Values.abTest.controlModelVersion | quote }}
  AB_CANDIDATE_MODEL_VERSION: {{ .Values.abTest.candidateModelVersion | quote }}
  AB_CONTROL_TRITON_URL: {{ .Values.abTest.controlTritonUrl | quote }}
  AB_CANDIDATE_TRITON_URL: {{ .Values.abTest.candidateTritonUrl | quote }}
  FORCE_NOT_READY: {{ .Values.api.config.forceNotReady | quote }}
  ALLOW_FEATURE_FALLBACK: {{ .Values.api.config.allowFeatureFallback | quote }}
  MODEL_ITEM_NUM: {{ .Values.api.config.modelItemNum | quote }}
  MODEL_CATEGORY_NUM: {{ .Values.api.config.modelCategoryNum | quote }}
  MODEL_BRAND_NUM: {{ .Values.api.config.modelBrandNum | quote }}
  MODEL_PRICE_BUCKET_NUM: {{ .Values.api.config.modelPriceBucketNum | quote }}
  MODEL_EVENT_TYPE_NUM: {{ .Values.api.config.modelEventTypeNum | quote }}
  MODEL_TIME_BUCKET_NUM: {{ .Values.api.config.modelTimeBucketNum | quote }}
  RECSYS_JSON_LOGS: {{ .Values.api.config.jsonLogs | quote }}
  RECSYS_OTEL_ENABLED: {{ .Values.api.config.otelEnabled | quote }}
  OTEL_SERVICE_NAME: {{ .Values.api.config.otelServiceName | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.api.config.otelEndpoint | quote }}
