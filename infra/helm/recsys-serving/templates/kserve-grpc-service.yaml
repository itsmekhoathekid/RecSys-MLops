{{- if .Values.kserve.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kserve.grpcService.name }}
  namespace: {{ .Values.kserve.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.kserve.inferenceService.name }}
    app.kubernetes.io/component: grpc-serving
spec:
  selector:
{{ toYaml .Values.kserve.grpcService.selector | indent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.kserve.grpcService.port }}
      targetPort: {{ .Values.kserve.grpcService.targetPort }}
      protocol: TCP
{{- if and (or .Values.abTest.enabled .Values.shadow.enabled) .Values.kserve.inferenceService.candidateStorageUri }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kserve.grpcService.candidateName }}
  namespace: {{ .Values.kserve.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.kserve.inferenceService.candidateName }}
    app.kubernetes.io/component: grpc-serving
    recsys.ai/ab-variant: candidate
spec:
  selector:
{{ toYaml .Values.kserve.grpcService.candidateSelector | indent 4 }}
  ports:
    - name: grpc
      port: {{ .Values.kserve.grpcService.port }}
      targetPort: {{ .Values.kserve.grpcService.targetPort }}
      protocol: TCP
{{- end }}
{{- end }}
