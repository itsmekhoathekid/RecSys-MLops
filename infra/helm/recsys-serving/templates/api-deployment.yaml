apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.name }}
  namespace: {{ .Values.api.namespace.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.api.name }}
spec:
{{- if not (and .Values.autoscaling.http.enabled .Values.autoscaling.http.api.enabled) }}
  replicas: {{ .Values.api.replicas }}
{{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.api.rollout.maxUnavailable }}
      maxSurge: {{ .Values.api.rollout.maxSurge }}
  minReadySeconds: {{ .Values.api.rollout.minReadySeconds }}
  progressDeadlineSeconds: {{ .Values.api.rollout.progressDeadlineSeconds }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.api.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.api.name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/api-configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.api.service.targetPort | quote }}
    spec:
      {{- if .Values.api.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.api.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.api.tolerations }}
      tolerations:
{{ toYaml .Values.api.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.api.imagePullPolicy }}
          {{- if .Values.api.command }}
          command:
{{ toYaml .Values.api.command | nindent 12 }}
          {{- end }}
          {{- if .Values.api.args }}
          args:
{{ toYaml .Values.api.args | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Values.api.name }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 2

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
