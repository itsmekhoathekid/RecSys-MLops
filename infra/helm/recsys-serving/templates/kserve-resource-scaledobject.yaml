{{- if .Values.autoscaling.kserveResource.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Values.autoscaling.kserveResource.name }}
  namespace: {{ .Values.kserve.namespace.name }}
  annotations:
    scaledobject.keda.sh/transfer-hpa-ownership: "true"
  labels:
    app.kubernetes.io/name: {{ .Values.kserve.inferenceService.name }}
    app.kubernetes.io/component: resource-autoscaling
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.autoscaling.kserveResource.deploymentName }}
  minReplicaCount: {{ .Values.autoscaling.kserveResource.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.kserveResource.maxReplicas }}
  pollingInterval: {{ .Values.autoscaling.kserveResource.pollingInterval }}
  cooldownPeriod: {{ .Values.autoscaling.kserveResource.cooldownPeriod }}
  advanced:
    restoreToOriginalReplicaCount: {{ .Values.autoscaling.kserveResource.restoreToOriginalReplicaCount }}
    horizontalPodAutoscalerConfig:
      name: {{ .Values.autoscaling.kserveResource.hpaName }}
  triggers:
{{- if .Values.autoscaling.kserveResource.cpu.enabled }}
    - type: cpu
      metricType: {{ .Values.autoscaling.kserveResource.cpu.metricType }}
      metadata:
        value: {{ .Values.autoscaling.kserveResource.cpu.value | quote }}
{{- end }}
{{- if .Values.autoscaling.kserveResource.memory.enabled }}
    - type: memory
      metricType: {{ .Values.autoscaling.kserveResource.memory.metricType }}
      metadata:
        value: {{ .Values.autoscaling.kserveResource.memory.value | quote }}
{{- end }}
{{- if and (or .Values.abTest.enabled .Values.shadow.enabled) .Values.kserve.inferenceService.candidateStorageUri }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Values.autoscaling.kserveResource.candidateName }}
  namespace: {{ .Values.kserve.namespace.name }}
  annotations:
    scaledobject.keda.sh/transfer-hpa-ownership: "true"
  labels:
    app.kubernetes.io/name: {{ .Values.kserve.inferenceService.candidateName }}
    app.kubernetes.io/component: resource-autoscaling
    recsys.ai/ab-variant: candidate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.autoscaling.kserveResource.candidateDeploymentName }}
  minReplicaCount: {{ .Values.autoscaling.kserveResource.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.kserveResource.maxReplicas }}
  pollingInterval: {{ .Values.autoscaling.kserveResource.pollingInterval }}
  cooldownPeriod: {{ .Values.autoscaling.kserveResource.cooldownPeriod }}
  advanced:
    restoreToOriginalReplicaCount: {{ .Values.autoscaling.kserveResource.restoreToOriginalReplicaCount }}
    horizontalPodAutoscalerConfig:
      name: {{ .Values.autoscaling.kserveResource.candidateHpaName }}
  triggers:
{{- if .Values.autoscaling.kserveResource.cpu.enabled }}
    - type: cpu
      metricType: {{ .Values.autoscaling.kserveResource.cpu.metricType }}
      metadata:
        value: {{ .Values.autoscaling.kserveResource.cpu.value | quote }}
{{- end }}
{{- if .Values.autoscaling.kserveResource.memory.enabled }}
    - type: memory
      metricType: {{ .Values.autoscaling.kserveResource.memory.metricType }}
      metadata:
        value: {{ .Values.autoscaling.kserveResource.memory.value | quote }}
{{- end }}
{{- end }}
{{- end }}
