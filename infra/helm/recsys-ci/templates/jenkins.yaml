{{- if .Values.jenkins.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.jenkins.pvc.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  {{- if .Values.jenkins.pvc.volumeName }}
  volumeName: {{ .Values.jenkins.pvc.volumeName }}
  {{- end }}
  accessModes:
{{ toYaml .Values.jenkins.pvc.accessModes | indent 4 }}
  {{- if .Values.jenkins.pvc.storageClassName }}
  storageClassName: {{ .Values.jenkins.pvc.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.jenkins.pvc.storage }}
{{- if and .Values.jenkins.dind.enabled .Values.jenkins.dind.pvc.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.jenkins.dind.pvc.name }}
  namespace: {{ .Values.namespace.name }}
spec:
  accessModes:
{{ toYaml .Values.jenkins.dind.pvc.accessModes | indent 4 }}
  {{- if .Values.jenkins.dind.pvc.storageClassName }}
  storageClassName: {{ .Values.jenkins.dind.pvc.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.jenkins.dind.pvc.storage }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-jenkins
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: recsys-jenkins
    app.kubernetes.io/part-of: recsys-ci
spec:
  replicas: {{ .Values.jenkins.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: recsys-jenkins
  template:
    metadata:
      annotations:
        checksum/jenkins-init: {{ include (print $.Template.BasePath "/jenkins-init-configmap.yaml") . | sha256sum }}
{{ toYaml .Values.serviceMesh.jenkinsPodAnnotations | indent 8 }}
      labels:
        app.kubernetes.io/name: recsys-jenkins
        app.kubernetes.io/part-of: recsys-ci
    spec:
      serviceAccountName: {{ .Values.rbac.serviceAccountName }}
      initContainers:
        - name: fix-jenkins-home-permissions
          image: {{ .Values.jenkins.image }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - {{- if and .Values.jenkins.dind.enabled .Values.jenkins.dind.useJenkinsHomePvc }} mkdir -p /var/jenkins_home/docker-graph && chown 1000:1000 /var/jenkins_home /var/jenkins_home/docker-graph{{- else }} chown 1000:1000 /var/jenkins_home{{- end }}
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
        {{- if .Values.jenkins.plugins.installOnStartup }}
        - name: install-jenkins-plugins
          image: {{ .Values.jenkins.image }}
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /var/jenkins_home/plugins
              missing=0
              for plugin in {{ join " " .Values.jenkins.plugins.required }}; do
                plugin_name="${plugin%%:*}"
                if [ ! -e "/var/jenkins_home/plugins/${plugin_name}.jpi" ] && [ ! -e "/var/jenkins_home/plugins/${plugin_name}.hpi" ]; then
                  missing=1
                fi
              done
              if [ "${missing}" = "1" ]; then
                jenkins-plugin-cli \
                  --plugin-download-directory /var/jenkins_home/plugins \
                  --plugins {{ join " " .Values.jenkins.plugins.required }}
              fi
              chown -R 1000:1000 /var/jenkins_home/plugins
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
        {{- end }}
      containers:
        - name: jenkins
          image: {{ .Values.jenkins.image }}
          imagePullPolicy: IfNotPresent
          {{- if .Values.jenkins.runtimeTools.installOnStartup }}
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                curl \
                docker-cli \
                docker.io \
                gnupg \
                python3 \
                python3-pip \
                python3-venv \
                tar \
                unzip
              rm -rf /var/lib/apt/lists/*

              if ! command -v uv >/dev/null 2>&1; then
                curl -LsSf https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/usr/local/bin sh
                chmod +x /usr/local/bin/uv
              fi
              if ! command -v kubectl >/dev/null 2>&1; then
                curl -fsSL -o /usr/local/bin/kubectl "https://dl.k8s.io/release/{{ .Values.jenkins.runtimeTools.kubectlVersion }}/bin/linux/amd64/kubectl"
                chmod +x /usr/local/bin/kubectl
              fi
              if ! command -v helm >/dev/null 2>&1; then
                curl -fsSL -o /tmp/helm.tgz "https://get.helm.sh/helm-{{ .Values.jenkins.runtimeTools.helmVersion }}-linux-amd64.tar.gz"
                tar -xzf /tmp/helm.tgz -C /tmp
                mv /tmp/linux-amd64/helm /usr/local/bin/helm
                chmod +x /usr/local/bin/helm
                rm -rf /tmp/helm.tgz /tmp/linux-amd64
              fi
              ln -sf /opt/java/openjdk/bin/java /usr/local/bin/java

              python3 --version
              uv --version
              docker --version
              kubectl version --client=true
              helm version --short
              exec /usr/bin/tini -- su -s /bin/bash jenkins -c 'export JAVA_HOME=/opt/java/openjdk; export PATH=/opt/java/openjdk/bin:/usr/local/bin:/usr/bin:/bin; /usr/local/bin/jenkins.sh'
          securityContext:
            runAsUser: 0
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
            - name: agent
              containerPort: 50000
          env:
            - name: IMAGE_PUSH_REGISTRY
              value: {{ .Values.jenkins.imagePushRegistry }}
            - name: IMAGE_PULL_REGISTRY
              value: {{ .Values.jenkins.imagePullRegistry }}
            - name: DOCKER_HOST
              value: tcp://localhost:2375
            - name: UV_LINK_MODE
              value: copy
            - name: JAVA_OPTS
              value: {{ .Values.jenkins.javaOpts | quote }}
            - name: JENKINS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jenkins.adminSecretName }}
                  key: username
            - name: JENKINS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jenkins.adminSecretName }}
                  key: password
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: jenkins-init
              mountPath: /var/jenkins_home/init.groovy.d
              readOnly: true
          {{- with .Values.jenkins.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
        {{- if .Values.jenkins.dind.enabled }}
        - name: docker
          image: {{ .Values.jenkins.dind.image }}
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - --host=tcp://0.0.0.0:2375
            - --host=unix:///var/run/docker.sock
            - --tls=false
            - --storage-driver={{ .Values.jenkins.dind.storageDriver }}
            {{- range .Values.jenkins.dind.insecureRegistries }}
            - --insecure-registry={{ . }}
            {{- end }}
          volumeMounts:
            - name: docker-graph-storage
              mountPath: /var/lib/docker
              {{- if .Values.jenkins.dind.useJenkinsHomePvc }}
              subPath: docker-graph
              {{- end }}
          {{- with .Values.jenkins.dind.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: {{ .Values.jenkins.pvc.name }}
        - name: docker-graph-storage
          {{- if and .Values.jenkins.dind.enabled .Values.jenkins.dind.useJenkinsHomePvc }}
          persistentVolumeClaim:
            claimName: {{ .Values.jenkins.pvc.name }}
          {{- else if and .Values.jenkins.dind.enabled .Values.jenkins.dind.pvc.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.jenkins.dind.pvc.name }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: jenkins-init
          configMap:
            name: recsys-jenkins-init
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.jenkins.service.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: recsys-jenkins
    app.kubernetes.io/part-of: recsys-ci
spec:
  type: {{ .Values.jenkins.service.type }}
  selector:
    app.kubernetes.io/name: recsys-jenkins
  ports:
    - name: http
      port: {{ .Values.jenkins.service.httpPort }}
      targetPort: http
    - name: agent
      port: {{ .Values.jenkins.service.agentPort }}
      targetPort: agent
{{- end }}
