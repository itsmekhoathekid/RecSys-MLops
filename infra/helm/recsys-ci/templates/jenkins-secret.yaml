{{- if .Values.jenkins.enabled }}
{{- $existing := lookup "v1" "Secret" .Values.namespace.name .Values.jenkins.adminSecretName }}
{{- $password := randAlphaNum 24 }}
{{- if and $existing (hasKey $existing.data "password") }}
{{- $password = (index $existing.data "password" | b64dec) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.jenkins.adminSecretName }}
  namespace: {{ .Values.namespace.name }}
type: Opaque
data:
  username: {{ .Values.jenkins.adminUser | b64enc | quote }}
  password: {{ $password | b64enc | quote }}
{{- end }}
