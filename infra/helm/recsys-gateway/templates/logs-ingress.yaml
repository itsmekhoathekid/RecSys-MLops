{{- if .Values.logs.enabled }}
{{- $logsRootRedirect := .Values.logs.rootRedirect | default dict }}
{{- $logsRateLimit := .Values.logs.rateLimit | default dict }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recsys-logs-gateway
  namespace: {{ .Values.logs.namespace }}
  annotations:
    {{- if .Values.auth.enabled }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.auth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: {{ .Values.auth.realm | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/upstream-vhost: {{ .Values.logs.upstreamHost | default (printf "%s.%s.svc.cluster.local" .Values.logs.service.name .Values.logs.namespace) | quote }}
    {{- if ($logsRateLimit.enabled | default false) }}
    nginx.ingress.kubernetes.io/limit-rps: {{ $logsRateLimit.rps | quote }}
    nginx.ingress.kubernetes.io/limit-rpm: {{ $logsRateLimit.rpm | quote }}
    nginx.ingress.kubernetes.io/limit-connections: {{ $logsRateLimit.connections | quote }}
    nginx.ingress.kubernetes.io/limit-req-status-code: {{ $logsRateLimit.statusCode | quote }}
    {{- end }}
    {{- if .Values.tls.enabled }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuerName | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.gateway.ingressClassName }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.logs.host }}
      secretName: {{ .Values.tls.secretNames.logs }}
  {{- end }}
  rules:
    - host: {{ .Values.logs.host }}
      http:
        paths:
          {{- if ($logsRootRedirect.enabled | default false) }}
          - path: /loki
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.logs.service.name }}
                port:
                  number: {{ .Values.logs.service.port }}
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: {{ .Values.logs.service.name }}
                port:
                  number: {{ .Values.logs.service.port }}
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ .Values.logs.service.name }}
                port:
                  number: {{ .Values.logs.service.port }}
          {{- else }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.logs.service.name }}
                port:
                  number: {{ .Values.logs.service.port }}
          {{- end }}
{{- end }}
