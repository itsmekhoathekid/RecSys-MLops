{{- if and .Values.logs.enabled ((.Values.logs.rootRedirect | default dict).enabled | default false) }}
{{- $logsRootRedirect := .Values.logs.rootRedirect | default dict }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recsys-logs-root-redirect
  namespace: {{ .Values.logs.namespace }}
  annotations:
    {{- if .Values.auth.enabled }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.auth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: {{ .Values.auth.realm | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/permanent-redirect: {{ printf "%s://%s%s" (ternary "https" "http" .Values.tls.enabled) .Values.grafana.host ($logsRootRedirect.path | default "/d/recsys-logs/logs-overview") | quote }}
    {{- if .Values.tls.enabled }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    {{- end }}
spec:
  ingressClassName: {{ .Values.gateway.ingressClassName }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.logs.host }}
      secretName: {{ .Values.tls.secretNames.logs }}
  {{- end }}
  rules:
    - host: {{ .Values.logs.host }}
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: {{ .Values.logs.service.name }}
                port:
                  number: {{ .Values.logs.service.port }}
{{- end }}
