{{- if .Values.grafana.enabled }}
{{- $grafanaRateLimit := .Values.grafana.rateLimit | default dict }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recsys-grafana-gateway
  namespace: {{ .Values.grafana.namespace }}
  annotations:
    {{- if .Values.auth.enabled }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.auth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: {{ .Values.auth.realm | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/service-upstream: "true"
    {{- with .Values.grafana.upstreamHost }}
    nginx.ingress.kubernetes.io/upstream-vhost: {{ . | quote }}
    {{- end }}
    {{- if ($grafanaRateLimit.enabled | default false) }}
    nginx.ingress.kubernetes.io/limit-rps: {{ $grafanaRateLimit.rps | quote }}
    nginx.ingress.kubernetes.io/limit-rpm: {{ $grafanaRateLimit.rpm | quote }}
    nginx.ingress.kubernetes.io/limit-connections: {{ $grafanaRateLimit.connections | quote }}
    nginx.ingress.kubernetes.io/limit-req-status-code: {{ $grafanaRateLimit.statusCode | quote }}
    {{- end }}
    {{- if .Values.tls.enabled }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuerName | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.gateway.ingressClassName }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.grafana.host }}
      secretName: {{ .Values.tls.secretNames.grafana }}
  {{- end }}
  rules:
    - host: {{ .Values.grafana.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.grafana.service.name }}
                port:
                  number: {{ .Values.grafana.service.port }}
{{- end }}
