{{- if .Values.api.enabled }}
{{- $apiRateLimit := .Values.api.rateLimit | default dict }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: recsys-api-gateway
  namespace: {{ .Values.api.namespace }}
  annotations:
    {{- if .Values.auth.enabled }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.auth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: {{ .Values.auth.realm | quote }}
    {{- end }}
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/upstream-vhost: {{ .Values.api.upstreamHost | default (printf "%s.%s.svc.cluster.local" .Values.api.service.name .Values.api.namespace) | quote }}
    {{- if ($apiRateLimit.enabled | default false) }}
    nginx.ingress.kubernetes.io/limit-rps: {{ $apiRateLimit.rps | quote }}
    nginx.ingress.kubernetes.io/limit-rpm: {{ $apiRateLimit.rpm | quote }}
    nginx.ingress.kubernetes.io/limit-connections: {{ $apiRateLimit.connections | quote }}
    nginx.ingress.kubernetes.io/limit-req-status-code: {{ $apiRateLimit.statusCode | quote }}
    {{- end }}
    {{- if .Values.tls.enabled }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuerName | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.gateway.ingressClassName }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.api.host }}
      secretName: {{ .Values.tls.secretNames.api }}
  {{- end }}
  rules:
    - host: {{ .Values.api.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.api.service.name }}
                port:
                  number: {{ .Values.api.service.port }}
{{- end }}
