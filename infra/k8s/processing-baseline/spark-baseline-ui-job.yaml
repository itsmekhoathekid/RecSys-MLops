apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-baseline-ui-script
  namespace: recsys-dataflow
data:
  spark_baseline_ui.py: |
    from __future__ import annotations

    import argparse
    import json
    import time
    from typing import Any

    from pyspark.sql import functions as F
    from pyspark.sql.types import BooleanType

    from features.spark.build_silver_tables import (
        build_silver_tables,
        read_raw_lakehouse_tables,
        read_raw_parquet_tables,
    )
    from features.spark.session import row_count, spark_session, write_iceberg_table
    from features.spark.spark_batch_entrypoint import (
        _batch_source_path,
        _build_feature_outputs,
        _write_postgres_tables,
        load_config,
    )
    from lakehouse.iceberg import IcebergCatalogConfig, create_spark_namespace


    def run_ui_action(spark: Any, label: str, action):
        sc = spark.sparkContext
        group_id = label.lower().replace(" ", "-").replace(":", "").replace("/", "-")[:120]
        spark.catalog.clearCache()
        sc.setJobGroup(group_id, label, interruptOnCancel=True)
        sc.setJobDescription(label)
        sc.setLocalProperty("callSite.short", label)
        try:
            return action()
        finally:
            sc.setLocalProperty("spark.jobGroup.id", None)
            sc.setLocalProperty("spark.job.interruptOnCancel", None)
            sc.setLocalProperty("spark.job.description", None)
            sc.setLocalProperty("callSite.short", None)


    def _read_raw_tables_for_source(spark: Any, source: str, run_path: str | None, catalog: Any) -> dict[str, Any]:
        if source == "parquet":
            return read_raw_parquet_tables(spark, run_path)
        return read_raw_lakehouse_tables(spark, catalog)


    def _fail_if_schema_version_gt_2(events: Any) -> int:
        def supported(schema_version: int | None) -> bool:
            if schema_version is not None and int(schema_version) > 2:
                raise ValueError(f"unsupported behavior_events schema_version={schema_version}")
            return True

        supported_udf = F.udf(supported, BooleanType())
        return events.select(
            supported_udf(F.col("schema_version")).cast("int").alias("schema_supported")
        ).agg(F.sum("schema_supported").alias("supported_rows")).collect()[0]["supported_rows"]


    def run_heavy_sql_proof(spark: Any, label: str, query: str, *, partitions: int = 32) -> list[dict[str, Any]]:
        previous_adaptive = spark.conf.get("spark.sql.adaptive.enabled", "true")
        previous_shuffle_partitions = spark.conf.get("spark.sql.shuffle.partitions", "4")
        previous_exchange_reuse = spark.conf.get("spark.sql.exchange.reuse", "false")
        previous_subquery_reuse = spark.conf.get("spark.sql.execution.reuseSubquery", "false")
        try:
            # Keep many shuffle tasks visible in Spark UI for proof screenshots.
            spark.conf.set("spark.sql.adaptive.enabled", "false")
            spark.conf.set("spark.sql.shuffle.partitions", str(partitions))
            spark.conf.set("spark.sql.exchange.reuse", "false")
            spark.conf.set("spark.sql.execution.reuseSubquery", "false")
            return run_ui_action(
                spark,
                label,
                lambda: [row.asDict() for row in spark.sql(query).collect()],
            )
        finally:
            spark.conf.set("spark.sql.adaptive.enabled", previous_adaptive)
            spark.conf.set("spark.sql.shuffle.partitions", previous_shuffle_partitions)
            spark.conf.set("spark.sql.exchange.reuse", previous_exchange_reuse)
            spark.conf.set("spark.sql.execution.reuseSubquery", previous_subquery_reuse)


    def main() -> int:
        parser = argparse.ArgumentParser(
            description="Spark baseline UI proof for lakehouse -> Feast PostgreSQL offline store."
        )
        parser.add_argument("--config", default="configs/local/spark_batch.yaml")
        parser.add_argument("--sleep-seconds", type=int, default=10800)
        parser.add_argument("--fail-on-breaking-schema", action="store_true")
        args = parser.parse_args()

        spark = spark_session("recsys-spark-lakehouse-to-offline-store-baseline")
        config = load_config(args.config)
        input_config = config.get("input", {})
        output = config["output"]
        features = config["features"]
        catalog = IcebergCatalogConfig(
            catalog_name=output.get("iceberg_catalog", "recsys"),
            lakehouse_namespace=output.get("iceberg_lakehouse_namespace", "lakehouse"),
            offline_feature_catalog_name=output.get("offline_feature_catalog", "recsys_features"),
            feature_namespace=output.get("iceberg_feature_namespace", "feature_store"),
            warehouse_uri=output.get("lakehouse_warehouse", "s3a://recsys-lakehouse/warehouse"),
            offline_feature_warehouse_uri=output.get(
                "offline_feature_store_warehouse",
                "s3a://recsys-offline-feature-store/warehouse",
            ),
        )
        create_spark_namespace(spark, catalog)
        source, run_path = _batch_source_path(input_config, output)

        try:
            raw = run_ui_action(
                spark,
                "DP3 SPARK - read raw lakehouse tables for schema compatibility checks",
                lambda: _read_raw_tables_for_source(spark, source, run_path, catalog),
            )
            raw_events = raw["behavior_events"]
            breaking_schema_rows = run_ui_action(
                spark,
                "DP3 CHECK - count breaking schema_version rows before silver normalization",
                lambda: raw_events.filter(F.col("schema_version") > F.lit(2)).count(),
            )
            if args.fail_on_breaking_schema:
                run_ui_action(
                    spark,
                    "DP3 FAIL - unsupported schema_version should fail Spark task",
                    lambda: _fail_if_schema_version_gt_2(raw_events),
                )

            silver = run_ui_action(
                spark,
                "DP3 SPARK - read data lakehouse and build silver tables before offline-store export",
                lambda: build_silver_tables(spark, run_path=run_path, catalog=catalog, source=source),
            )
            clean_events = silver["clean_behavior_events"]
            rejected_events = silver["rejected_behavior_events"]
            clean_events.createOrReplaceTempView("clean_behavior_events_proof")

            clean_behavior_events = run_ui_action(
                spark,
                "DP3 SPARK - count clean behavior events from lakehouse",
                lambda: row_count(clean_events),
            )
            duplicate_rows = run_ui_action(
                spark,
                "DP3 CHECK - count rejected duplicate event_id rows before offline-store write",
                lambda: row_count(rejected_events),
            )
            schema_unknown_rows = run_ui_action(
                spark,
                "DP3 CHECK - count old lakehouse rows with missing or unknown device_type",
                lambda: clean_events.filter(F.col("device_type").isNull() | (F.col("device_type") == "unknown")).count(),
            )
            heavy_skew_sql = """
                WITH amplified AS (
                  SELECT
                    category_id,
                    product_id,
                    event_id,
                    user_id,
                    CAST(price AS DOUBLE) AS price,
                    repeat_id
                  FROM clean_behavior_events_proof
                  LATERAL VIEW explode(
                    sequence(
                      1,
                      CASE WHEN category_id = 1 THEN 24 ELSE 2 END
                    )
                  ) repeat_view AS repeat_id
                )
                SELECT
                  category_id,
                  COUNT(*) AS amplified_event_rows,
                  COUNT(DISTINCT event_id) AS source_event_count,
                  COUNT(DISTINCT product_id) AS product_cardinality_inside_category,
                  SUM(price) AS amplified_price_sum
                FROM amplified
                GROUP BY category_id
                ORDER BY amplified_event_rows DESC
                LIMIT 20
            """
            heavy_cardinality_sql = """
                WITH amplified AS (
                  SELECT
                    product_id,
                    event_id,
                    user_id,
                    category_id,
                    repeat_id,
                    CONCAT(CAST(product_id AS STRING), ':', event_id, ':', CAST(repeat_id AS STRING)) AS product_event_key
                  FROM clean_behavior_events_proof
                  LATERAL VIEW explode(sequence(1, 8)) repeat_view AS repeat_id
                )
                SELECT
                  product_id,
                  COUNT(*) AS amplified_rows,
                  COUNT(DISTINCT product_event_key) AS exact_high_cardinality_keys,
                  approx_count_distinct(product_event_key, 0.05) AS approx_high_cardinality_keys,
                  COUNT(DISTINCT user_id) AS user_cardinality_per_product
                FROM amplified
                GROUP BY product_id
                ORDER BY exact_high_cardinality_keys DESC, product_id ASC
                LIMIT 100
            """
            heavy_skew_result = run_heavy_sql_proof(
                spark,
                "DP3 HEAVY SQL - skewed category_id aggregation with 32 shuffle tasks",
                heavy_skew_sql,
            )
            heavy_cardinality_result = run_heavy_sql_proof(
                spark,
                "DP3 HEAVY SQL - high-cardinality product_event_key aggregation with 32 shuffle tasks",
                heavy_cardinality_sql,
            )

            outputs = run_ui_action(
                spark,
                "DP3 SPARK - build batch feature tables for Feast offline store",
                lambda: _build_feature_outputs(silver, catalog=catalog, features=features),
            )
            output_counts: dict[str, int] = {}
            for table_name, frame in outputs.items():
                short_name = table_name.rsplit(".", 1)[-1]
                run_ui_action(
                    spark,
                    f"DP3 SPARK - write Iceberg lakehouse feature table {short_name}",
                    lambda frame=frame, table_name=table_name: write_iceberg_table(frame, table_name, mode="overwrite"),
                )
                output_counts[short_name] = run_ui_action(
                    spark,
                    f"DP3 SPARK - count offline feature table {short_name}",
                    lambda frame=frame: row_count(frame),
                )
            run_ui_action(
                spark,
                "DP3 SPARK - export batch feature tables to PostgreSQL Feast offline store",
                lambda: _write_postgres_tables(outputs, catalog=catalog, output=output),
            )

            summary = {
                "engine": "spark",
                "flow": "data_lakehouse_to_postgresql_feast_offline_store",
                "version": "baseline",
                "lakehouse_source": f"{source}:{run_path}",
                "offline_store": "PostgreSQL Feast offline store",
                "clean_behavior_events": clean_behavior_events,
                "duplicate_rows_rejected_before_offline_store": duplicate_rows,
                "schema_evolution_unknown_device_type_rows": schema_unknown_rows,
                "breaking_schema_version_rows": breaking_schema_rows,
                "heavy_spark_sql_proof": {
                    "shuffle_partitions": 32,
                    "aqe_enabled_during_proof": False,
                    "skew_query": {
                        "label": "DP3 HEAVY SQL - skewed category_id aggregation with 32 shuffle tasks",
                        "amplification": "category_id=1 is expanded 24x, other categories are expanded 2x",
                        "top_rows": heavy_skew_result[:10],
                    },
                    "high_cardinality_query": {
                        "label": "DP3 HEAVY SQL - high-cardinality product_event_key aggregation with 32 shuffle tasks",
                        "amplification": "each generated behavior event is expanded 8x into product_event_key",
                        "top_rows": heavy_cardinality_result[:10],
                    },
                },
                "offline_feature_output_counts": output_counts,
                "data_quality_checks_visible_in_spark_ui": [
                    "DP3 HEAVY SQL - skewed category_id aggregation with 32 shuffle tasks",
                    "DP3 HEAVY SQL - high-cardinality product_event_key aggregation with 32 shuffle tasks",
                    "DP3 CHECK - count breaking schema_version rows before silver normalization",
                    "DP3 CHECK - count old lakehouse rows with missing or unknown device_type",
                    "DP3 CHECK - count rejected duplicate event_id rows before offline-store write",
                ],
            }
            print("SPARK_LAKEHOUSE_TO_OFFLINE_STORE_BASELINE=" + json.dumps(summary, sort_keys=True), flush=True)

            deadline = time.time() + args.sleep_seconds
            while time.time() < deadline:
                print(json.dumps({"status": "spark_offline_store_ui_alive", "seconds_left": int(deadline - time.time())}), flush=True)
                time.sleep(30)
            return 0
        finally:
            spark.stop()


    if __name__ == "__main__":
        raise SystemExit(main())
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-baseline-ui
  namespace: recsys-dataflow
  labels:
    app: spark-baseline-ui
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app: spark-baseline-ui
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      containers:
        - name: spark-baseline-ui
          image: recsys-spark:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: spark-ui
              containerPort: 4040
          command: ["/opt/spark/bin/spark-submit"]
          args:
            - "--master"
            - "local[2]"
            - "--conf"
            - "spark.driver.bindAddress=0.0.0.0"
            - "--conf"
            - "spark.driver.host=127.0.0.1"
            - "--conf"
            - "spark.driver.memory=1536m"
            - "--conf"
            - "spark.memory.fraction=0.45"
            - "--conf"
            - "spark.sql.autoBroadcastJoinThreshold=-1"
            - "--conf"
            - "spark.sql.exchange.reuse=false"
            - "--conf"
            - "spark.sql.execution.reuseSubquery=false"
            - "--conf"
            - "spark.sql.shuffle.partitions=4"
            - "--conf"
            - "spark.default.parallelism=4"
            - "/opt/recsys-baseline/spark_baseline_ui.py"
            - "--config"
            - "$(SPARK_BATCH_CONFIG)"
            - "--sleep-seconds"
            - "10800"
          env:
            - name: SPARK_SQL_SHUFFLE_PARTITIONS
              value: "4"
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
          volumeMounts:
            - name: script
              mountPath: /opt/recsys-baseline
            - name: processing-stress-configs
              mountPath: /opt/recsys/configs/local/spark_batch_e2e_1k.yaml
              subPath: spark_batch_e2e_1k.yaml
      volumes:
        - name: script
          configMap:
            name: spark-baseline-ui-script
        - name: processing-stress-configs
          configMap:
            name: processing-stress-configs
