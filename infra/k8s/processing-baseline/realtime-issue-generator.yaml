apiVersion: v1
kind: ConfigMap
metadata:
  name: realtime-issue-generator-script
  namespace: recsys-dataflow
data:
  realtime_issue_generator.py: |
    from __future__ import annotations

    import argparse
    import json
    import os
    import random
    import time
    from datetime import datetime, timedelta, timezone
    from decimal import Decimal
    from typing import Any

    from sinks.postgres_sink import build_upsert_sql


    def conninfo() -> str:
        return (
            f"host={os.getenv('POSTGRES_HOST', 'source-postgres')} "
            f"port={os.getenv('POSTGRES_PORT', '5432')} "
            f"dbname={os.getenv('POSTGRES_DB', 'recsys')} "
            f"user={os.getenv('POSTGRES_USER', 'recsys')} "
            f"password={os.getenv('POSTGRES_PASSWORD', 'recsys')}"
        )


    def upsert(cursor: Any, table_name: str, row: dict[str, Any]) -> None:
        columns = list(row.keys())
        cursor.execute(build_upsert_sql(table_name, columns), [row[column] for column in columns])


    def bootstrap_dimensions(cursor: Any, now: datetime, n_users: int, n_products: int) -> None:
        for offset in range(n_users):
            user_id = 700_000 + offset
            category_id = 7_000 + (offset % 5)
            brand_id = 6_000 + (offset % 7)
            upsert(cursor, "users", {
                "user_id": user_id, "signup_ts": now - timedelta(days=30), "signup_channel": "baseline_issues",
                "city": "HCMC", "country": "VN", "segment": "processing_baseline", "age_bucket": 3,
                "preferred_category_id": category_id, "preferred_brand_id": brand_id, "price_sensitivity": 0.5,
                "user_lifecycle_state": "active", "last_active_ts": now, "is_active": True,
                "created_ts": now, "updated_ts": now,
            })
            upsert(cursor, "user_preferences", {
                "user_id": user_id, "category_id": category_id, "brand_id": brand_id,
                "preference_weight": 1.0, "source": "baseline_issues", "created_ts": now, "updated_ts": now,
            })

        for offset in range(n_products):
            product_id = 600_000 + offset
            category_id = 7_000 + (offset % 5)
            brand_id = 6_000 + (offset % 7)
            price = Decimal(f"{20 + offset % 50}.99")
            upsert(cursor, "products", {
                "product_id": product_id, "product_name": f"Baseline Issue Product {product_id}",
                "category_id": category_id, "category_code": f"cat-{category_id}", "brand_id": brand_id,
                "brand_name": f"Brand {brand_id}", "base_price": price, "current_price": price,
                "price_bucket": int(offset % 10), "popularity_weight": 1.0 + (offset % 5) / 10.0,
                "is_active": True, "created_ts": now, "updated_ts": now,
            })
            upsert(cursor, "product_snapshots", {
                "product_id": product_id, "valid_from": now, "valid_to": now + timedelta(days=365),
                "category_id": category_id, "category_code": f"cat-{category_id}", "brand_id": brand_id,
                "brand_name": f"Brand {brand_id}", "current_price": price, "price_bucket": int(offset % 10),
                "is_active": True, "created_ts": now,
            })


    def event_rows(counter: int, now: datetime, n_users: int, n_products: int, *, duplicate_id: str | None, late: bool) -> dict[str, dict[str, Any]]:
        user_id = 700_000 + (counter % max(min(n_users, 12), 1))
        product_offset = 0 if counter % 10 < 8 else counter % n_products
        product_id = 600_000 + product_offset
        category_id = 7_000 + (product_offset % 5)
        brand_id = 6_000 + (product_offset % 7)
        price = Decimal(f"{20 + product_offset % 50}.99")
        event_type = ["view", "cart", "purchase"][counter % 3]
        event_timestamp = now - timedelta(minutes=random.randint(30, 180)) if late else now
        suffix = f"{int(now.timestamp() * 1000)}-{counter}"
        event_id = duplicate_id or f"baseline-issue-event-{suffix}"
        session_id = f"baseline-issue-session-{suffix}"
        request_id = f"baseline-issue-request-{suffix}"
        impression_id = f"baseline-issue-impression-{suffix}"
        order_id = f"baseline-issue-order-{suffix}" if event_type == "purchase" else None
        payload_hash = f"baseline-issue-{suffix}"
        rows = {
            "sessions": {
                "session_id": session_id, "user_id": user_id, "session_start_ts": event_timestamp,
                "session_end_ts": now + timedelta(minutes=5), "entry_source": "baseline_issues",
                "device_type": "web", "campaign_id": "baseline-issue-campaign", "session_end_reason": "active",
                "created_ts": now, "updated_ts": now,
            },
            "recommendation_requests": {
                "request_id": request_id, "user_id": user_id, "session_id": session_id, "request_timestamp": event_timestamp,
                "surface": "home", "context_product_id": product_id, "context_category_id": category_id,
                "device_type": "web", "source": "baseline_issues", "campaign_id": "baseline-issue-campaign",
                "created_ts": now, "schema_version": 2,
            },
            "impressions": {
                "impression_id": impression_id, "request_id": request_id, "user_id": user_id, "session_id": session_id,
                "impression_timestamp": event_timestamp, "candidate_product_id": product_id, "rank_position": 1,
                "candidate_source": "baseline_issues", "retrieval_score": 1.0, "ranking_score": 1.0,
                "surface": "home", "is_clicked": event_type in {"cart", "purchase"}, "created_ts": now,
                "schema_version": 2,
            },
            "behavior_events": {
                "event_id": event_id, "event_timestamp": event_timestamp, "created_ts": now, "ingestion_ts": now,
                "user_id": user_id, "session_id": session_id, "request_id": request_id, "impression_id": impression_id,
                "event_type": event_type, "product_id": product_id, "category_id": category_id, "brand_id": brand_id,
                "price": price, "price_bucket": int(product_offset % 10), "quantity": 1, "device_type": "web",
                "source": "baseline_issues", "campaign_id": "baseline-issue-campaign", "page_context": "home",
                "rank_position": 1, "order_id": order_id, "payload_hash": payload_hash,
                "event_date": event_timestamp.date(), "schema_version": 2, "drift_enabled": False,
                "drift_scenario": "none", "drift_phase": "none", "drift_factor": 1.0,
            },
        }
        if event_type == "purchase":
            rows["orders"] = {
                "order_id": order_id, "user_id": user_id, "session_id": session_id, "order_timestamp": event_timestamp,
                "status": "paid", "gross_amount": price, "discount_amount": Decimal("0.00"), "net_amount": price,
                "coupon_code": "", "payment_method": "card", "shipping_city": "HCMC", "paid_ts": now,
                "cancelled_ts": None, "refunded_ts": None, "created_ts": now, "updated_ts": now,
                "drift_enabled": False, "drift_scenario": "none", "drift_phase": "none", "drift_factor": 1.0,
            }
            rows["order_items"] = {
                "order_item_id": f"baseline-issue-order-item-{suffix}", "order_id": order_id,
                "product_id": product_id, "quantity": 1, "unit_price": price, "discount_amount": Decimal("0.00"),
                "line_amount": price, "created_ts": now,
            }
        return rows


    def main() -> int:
        import psycopg

        parser = argparse.ArgumentParser()
        parser.add_argument("--duration-seconds", type=int, default=300)
        parser.add_argument("--interval-seconds", type=float, default=1.0)
        parser.add_argument("--base-events-per-tick", type=int, default=20)
        parser.add_argument("--burst-events-per-tick", type=int, default=600)
        parser.add_argument("--burst-every-n-ticks", type=int, default=10)
        parser.add_argument("--late-rate", type=float, default=0.65)
        parser.add_argument("--duplicate-rate", type=float, default=0.35)
        parser.add_argument("--n-users", type=int, default=30)
        parser.add_argument("--n-products", type=int, default=60)
        args = parser.parse_args()

        random.seed(42)
        counter = 0
        recent_event_ids: list[str] = []
        started = time.time()
        with psycopg.connect(conninfo()) as connection:
            with connection.cursor() as cursor:
                bootstrap_dimensions(cursor, datetime.now(timezone.utc), args.n_users, args.n_products)
            connection.commit()

            tick = 0
            while time.time() - started < args.duration_seconds:
                tick += 1
                now = datetime.now(timezone.utc)
                per_tick = args.burst_events_per_tick if tick % args.burst_every_n_ticks == 0 else args.base_events_per_tick
                inserted = 0
                duplicates = 0
                late = 0
                with connection.cursor() as cursor:
                    for _ in range(per_tick):
                        duplicate_id = None
                        if recent_event_ids and random.random() < args.duplicate_rate:
                            duplicate_id = random.choice(recent_event_ids[-200:])
                            duplicates += 1
                        is_late = random.random() < args.late_rate
                        late += 1 if is_late else 0
                        rows = event_rows(counter, now, args.n_users, args.n_products, duplicate_id=duplicate_id, late=is_late)
                        for table in ["sessions", "recommendation_requests", "impressions", "behavior_events", "orders", "order_items"]:
                            if table in rows:
                                upsert(cursor, table, rows[table])
                        recent_event_ids.append(rows["behavior_events"]["event_id"])
                        counter += 1
                        inserted += 1
                connection.commit()
                print(json.dumps({
                    "status": "baseline_issue_generator_tick",
                    "tick": tick,
                    "inserted": inserted,
                    "total_events": counter,
                    "duplicates_this_tick": duplicates,
                    "late_this_tick": late,
                    "burst_tick": per_tick == args.burst_events_per_tick,
                }), flush=True)
                time.sleep(args.interval_seconds)
        return 0


    if __name__ == "__main__":
        raise SystemExit(main())
---
apiVersion: batch/v1
kind: Job
metadata:
  name: realtime-issue-generator
  namespace: recsys-dataflow
  labels:
    app: realtime-issue-generator
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app: realtime-issue-generator
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      containers:
        - name: generator
          image: recsys-dataflow-cli:local
          imagePullPolicy: IfNotPresent
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              PYTHONPATH=/opt/recsys/apps/data-platform/src:/opt/recsys/apps/data-platform/data-generator/src:/opt/recsys \
              /opt/venv/bin/python /opt/recsys-baseline/realtime_issue_generator.py \
                --duration-seconds 300 \
                --interval-seconds 1 \
                --base-events-per-tick 20 \
                --burst-events-per-tick 600 \
                --burst-every-n-ticks 10 \
                --late-rate 0.65 \
                --duplicate-rate 0.35
          envFrom:
            - configMapRef:
                name: recsys-data-platform-config
            - secretRef:
                name: recsys-data-platform-secret
          volumeMounts:
            - name: script
              mountPath: /opt/recsys-baseline
      volumes:
        - name: script
          configMap:
            name: realtime-issue-generator-script
