# PIPELINE DEFINITION
# Name: recsys-bst-feature-train-evaluate
# Description: Feature engineering, BST training, evaluation, MLflow tracking, MinIO artifacts, and Postgres model config.
# Inputs:
#    bst_config_path: str [Default: 'configs/local/bst.yaml']
#    config_path: str [Default: 'configs/local/spark_batch.yaml']
#    cpus_per_trial: float [Default: 1.0]
#    dataset_metadata_path: str [Default: '/workspace/recsys/data_platform/output/ml/bst_split/dataset_version_meta.json']
#    eval_metrics_path: str [Default: '/workspace/recsys/data_platform/output/ml/eval_metrics.json']
#    feature_service_name: str [Default: 'bst_ranking_v1']
#    feature_summary_path: str [Default: '/workspace/recsys/data_platform/output/feature_summary.json']
#    gpu_limit: int [Default: 1.0]
#    gpus_per_trial: float [Default: 0.0]
#    head_ray_num_cpus: str [Default: '0']
#    hudi_catalog_name: str [Default: 'recsys_features']
#    hudi_warehouse: str [Default: 's3a://recsys-offline-feature-store/warehouse']
#    iceberg_catalog_name: str [Default: 'recsys_features']
#    iceberg_warehouse: str [Default: 's3a://recsys-offline-feature-store/warehouse']
#    max_history_len: int [Default: 50.0]
#    max_trials: int [Default: 2.0]
#    num_epochs: int [Default: 1.0]
#    offline_feature_table: str [Default: 'recsys_features.feature_store.ml_bst_training']
#    output_base: str [Default: '/workspace/recsys/data_platform/output']
#    parallel_trials: int [Default: 1.0]
#    pipeline_run_id: str [Default: 'manual']
#    promotion_manifest_path: str [Default: '/workspace/recsys/data_platform/output/ml/serving/promotion_manifest.json']
#    promotion_metric_name: str [Default: 'test_ndcg_at_10']
#    pvc_mount_path: str [Default: '/workspace']
#    pvc_name: str [Default: 'recsys-mlops-pvc']
#    ray_best_result_path: str [Default: '/workspace/recsys/data_platform/output/ml/ray/best_result.json']
#    ray_image: str [Default: 'recsys-mlops-training:local']
#    ray_job_name: str [Default: 'recsys-bst-ray-tune']
#    ray_namespace: str [Default: 'kubeflow']
#    ray_output_dir: str [Default: '/workspace/recsys/data_platform/output/ml/ray']
#    ray_status_path: str [Default: '/workspace/recsys/data_platform/output/ml/ray/rayjob_status.json']
#    runtime_secret_name: str [Default: 'recsys-mlops-runtime']
#    serving_output_dir: str [Default: '/workspace/recsys/data_platform/output/ml/serving']
#    source_run_path: str [Default: 'apps/data-platform/data-generator/src/output/test_10k_seed42']
#    split_output_dir: str [Default: '/workspace/recsys/data_platform/output/ml/bst_split']
#    training_percent: float [Default: 0.01]
#    use_gpu: bool [Default: False]
#    worker_replicas: int [Default: 1.0]
#    workspace_root: str [Default: '/workspace/recsys']
components:
  comp-evaluate-bst:
    executorLabel: exec-evaluate-bst
    inputDefinitions:
      parameters:
        config_path:
          parameterType: STRING
        dataset_metadata_path:
          parameterType: STRING
        metrics_path:
          parameterType: STRING
        ray_result_path:
          parameterType: STRING
  comp-prepare-training-data:
    executorLabel: exec-prepare-training-data
    inputDefinitions:
      parameters:
        dataset_metadata_path:
          parameterType: STRING
        feature_service_name:
          parameterType: STRING
        hudi_catalog_name:
          parameterType: STRING
        hudi_warehouse:
          parameterType: STRING
        iceberg_catalog_name:
          parameterType: STRING
        iceberg_warehouse:
          parameterType: STRING
        max_history_len:
          parameterType: NUMBER_INTEGER
        offline_feature_table:
          parameterType: STRING
        output_dir:
          parameterType: STRING
  comp-promote-bst-model:
    executorLabel: exec-promote-bst-model
    inputDefinitions:
      parameters:
        config_path:
          parameterType: STRING
        manifest_path:
          parameterType: STRING
        metric_name:
          parameterType: STRING
        output_dir:
          parameterType: STRING
        ray_result_path:
          parameterType: STRING
  comp-submit-rayjob:
    executorLabel: exec-submit-rayjob
    inputDefinitions:
      parameters:
        best_result_path:
          parameterType: STRING
        cpus_per_trial:
          parameterType: NUMBER_DOUBLE
        dataset_metadata_path:
          parameterType: STRING
        gpu_limit:
          parameterType: NUMBER_INTEGER
        gpus_per_trial:
          parameterType: NUMBER_DOUBLE
        head_ray_num_cpus:
          parameterType: STRING
        image:
          parameterType: STRING
        job_name:
          parameterType: STRING
        max_trials:
          parameterType: NUMBER_INTEGER
        namespace:
          parameterType: STRING
        num_epochs:
          parameterType: NUMBER_INTEGER
        parallel_trials:
          parameterType: NUMBER_INTEGER
        pipeline_run_id:
          parameterType: STRING
        pvc_name:
          parameterType: STRING
        ray_output_dir:
          parameterType: STRING
        runtime_secret_name:
          parameterType: STRING
        split_dir:
          parameterType: STRING
        status_path:
          parameterType: STRING
        training_percent:
          parameterType: NUMBER_DOUBLE
        use_gpu:
          parameterType: BOOLEAN
        worker_replicas:
          parameterType: NUMBER_INTEGER
deploymentSpec:
  executors:
    exec-evaluate-bst:
      container:
        args:
        - --config-path
        - '{{$.inputs.parameters[''config_path'']}}'
        - --ray-result-path
        - '{{$.inputs.parameters[''ray_result_path'']}}'
        - --split
        - test
        - --metrics-path
        - '{{$.inputs.parameters[''metrics_path'']}}'
        - --dataset-metadata-path
        - '{{$.inputs.parameters[''dataset_metadata_path'']}}'
        command:
        - python
        - /opt/recsys/apps/ml-system/src/evaluate_ray_best_bst.py
        image: recsys-mlops-training:local
    exec-prepare-training-data:
      container:
        args:
        - --master
        - local[*]
        - --packages
        - org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.9.2,org.apache.hudi:hudi-spark3.5-bundle_2.12:1.0.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
        - /opt/recsys/apps/ml-system/src/prepare_bst_training_data.py
        - --feature-source
        - offline_feature_store
        - --offline-feature-table
        - '{{$.inputs.parameters[''offline_feature_table'']}}'
        - --output-dir
        - '{{$.inputs.parameters[''output_dir'']}}'
        - --max-history-len
        - '{{$.inputs.parameters[''max_history_len'']}}'
        - --feature-service-name
        - '{{$.inputs.parameters[''feature_service_name'']}}'
        - --hudi-enabled
        - 'true'
        - --hudi-catalog-name
        - '{{$.inputs.parameters[''hudi_catalog_name'']}}'
        - --hudi-warehouse
        - '{{$.inputs.parameters[''hudi_warehouse'']}}'
        - --iceberg-catalog-name
        - '{{$.inputs.parameters[''iceberg_catalog_name'']}}'
        - --iceberg-warehouse
        - '{{$.inputs.parameters[''iceberg_warehouse'']}}'
        - --dataset-metadata-path
        - '{{$.inputs.parameters[''dataset_metadata_path'']}}'
        command:
        - /opt/spark/bin/spark-submit
        image: recsys-mlops-spark:local
    exec-promote-bst-model:
      container:
        args:
        - --config-path
        - '{{$.inputs.parameters[''config_path'']}}'
        - --ray-result-path
        - '{{$.inputs.parameters[''ray_result_path'']}}'
        - --output-dir
        - '{{$.inputs.parameters[''output_dir'']}}'
        - --manifest-path
        - '{{$.inputs.parameters[''manifest_path'']}}'
        - --metric-name
        - '{{$.inputs.parameters[''metric_name'']}}'
        command:
        - python
        - /opt/recsys/apps/ml-system/src/model_promotion.py
        image: recsys-mlops-training:local
    exec-submit-rayjob:
      container:
        args:
        - --pipeline-run-id
        - '{{$.inputs.parameters[''pipeline_run_id'']}}'
        - --namespace
        - '{{$.inputs.parameters[''namespace'']}}'
        - --job-name
        - '{{$.inputs.parameters[''job_name'']}}'
        - --image
        - '{{$.inputs.parameters[''image'']}}'
        - --pvc-name
        - '{{$.inputs.parameters[''pvc_name'']}}'
        - --runtime-secret-name
        - '{{$.inputs.parameters[''runtime_secret_name'']}}'
        - --split-dir
        - '{{$.inputs.parameters[''split_dir'']}}'
        - --ray-output-dir
        - '{{$.inputs.parameters[''ray_output_dir'']}}'
        - --best-result-path
        - '{{$.inputs.parameters[''best_result_path'']}}'
        - --training-percent
        - '{{$.inputs.parameters[''training_percent'']}}'
        - --num-epochs
        - '{{$.inputs.parameters[''num_epochs'']}}'
        - --max-trials
        - '{{$.inputs.parameters[''max_trials'']}}'
        - --parallel-trials
        - '{{$.inputs.parameters[''parallel_trials'']}}'
        - --cpus-per-trial
        - '{{$.inputs.parameters[''cpus_per_trial'']}}'
        - --gpus-per-trial
        - '{{$.inputs.parameters[''gpus_per_trial'']}}'
        - --worker-replicas
        - '{{$.inputs.parameters[''worker_replicas'']}}'
        - --head-ray-num-cpus
        - '{{$.inputs.parameters[''head_ray_num_cpus'']}}'
        - --use-gpu-value
        - '{{$.inputs.parameters[''use_gpu'']}}'
        - --gpu-limit
        - '{{$.inputs.parameters[''gpu_limit'']}}'
        - --status-path
        - '{{$.inputs.parameters[''status_path'']}}'
        - --dataset-metadata-path
        - '{{$.inputs.parameters[''dataset_metadata_path'']}}'
        command:
        - python
        - /opt/recsys/apps/ml-system/src/submit_ray_job.py
        image: recsys-mlops-training:local
pipelineInfo:
  description: Feature engineering, BST training, evaluation, MLflow tracking, MinIO
    artifacts, and Postgres model config.
  name: recsys-bst-feature-train-evaluate
root:
  dag:
    tasks:
      evaluate-bst:
        cachingOptions: {}
        componentRef:
          name: comp-evaluate-bst
        dependentTasks:
        - submit-rayjob
        inputs:
          parameters:
            config_path:
              componentInputParameter: bst_config_path
            dataset_metadata_path:
              componentInputParameter: dataset_metadata_path
            metrics_path:
              componentInputParameter: eval_metrics_path
            ray_result_path:
              componentInputParameter: ray_best_result_path
        taskInfo:
          name: evaluate-bst
      prepare-training-data:
        cachingOptions: {}
        componentRef:
          name: comp-prepare-training-data
        inputs:
          parameters:
            dataset_metadata_path:
              componentInputParameter: dataset_metadata_path
            feature_service_name:
              componentInputParameter: feature_service_name
            hudi_catalog_name:
              componentInputParameter: hudi_catalog_name
            hudi_warehouse:
              componentInputParameter: hudi_warehouse
            iceberg_catalog_name:
              componentInputParameter: iceberg_catalog_name
            iceberg_warehouse:
              componentInputParameter: iceberg_warehouse
            max_history_len:
              componentInputParameter: max_history_len
            offline_feature_table:
              componentInputParameter: offline_feature_table
            output_dir:
              componentInputParameter: split_output_dir
        taskInfo:
          name: prepare-training-data
      promote-bst-model:
        cachingOptions: {}
        componentRef:
          name: comp-promote-bst-model
        dependentTasks:
        - evaluate-bst
        inputs:
          parameters:
            config_path:
              componentInputParameter: bst_config_path
            manifest_path:
              componentInputParameter: promotion_manifest_path
            metric_name:
              componentInputParameter: promotion_metric_name
            output_dir:
              componentInputParameter: serving_output_dir
            ray_result_path:
              componentInputParameter: ray_best_result_path
        taskInfo:
          name: promote-bst-model
      submit-rayjob:
        cachingOptions: {}
        componentRef:
          name: comp-submit-rayjob
        dependentTasks:
        - prepare-training-data
        inputs:
          parameters:
            best_result_path:
              componentInputParameter: ray_best_result_path
            cpus_per_trial:
              componentInputParameter: cpus_per_trial
            dataset_metadata_path:
              componentInputParameter: dataset_metadata_path
            gpu_limit:
              componentInputParameter: gpu_limit
            gpus_per_trial:
              componentInputParameter: gpus_per_trial
            head_ray_num_cpus:
              componentInputParameter: head_ray_num_cpus
            image:
              componentInputParameter: ray_image
            job_name:
              componentInputParameter: ray_job_name
            max_trials:
              componentInputParameter: max_trials
            namespace:
              componentInputParameter: ray_namespace
            num_epochs:
              componentInputParameter: num_epochs
            parallel_trials:
              componentInputParameter: parallel_trials
            pipeline_run_id:
              componentInputParameter: pipeline_run_id
            pvc_name:
              componentInputParameter: pvc_name
            ray_output_dir:
              componentInputParameter: ray_output_dir
            runtime_secret_name:
              componentInputParameter: runtime_secret_name
            split_dir:
              componentInputParameter: split_output_dir
            status_path:
              componentInputParameter: ray_status_path
            training_percent:
              componentInputParameter: training_percent
            use_gpu:
              componentInputParameter: use_gpu
            worker_replicas:
              componentInputParameter: worker_replicas
        taskInfo:
          name: submit-rayjob
  inputDefinitions:
    parameters:
      bst_config_path:
        defaultValue: configs/local/bst.yaml
        isOptional: true
        parameterType: STRING
      config_path:
        defaultValue: configs/local/spark_batch.yaml
        isOptional: true
        parameterType: STRING
      cpus_per_trial:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_DOUBLE
      dataset_metadata_path:
        defaultValue: /workspace/recsys/data_platform/output/ml/bst_split/dataset_version_meta.json
        isOptional: true
        parameterType: STRING
      eval_metrics_path:
        defaultValue: /workspace/recsys/data_platform/output/ml/eval_metrics.json
        isOptional: true
        parameterType: STRING
      feature_service_name:
        defaultValue: bst_ranking_v1
        isOptional: true
        parameterType: STRING
      feature_summary_path:
        defaultValue: /workspace/recsys/data_platform/output/feature_summary.json
        isOptional: true
        parameterType: STRING
      gpu_limit:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      gpus_per_trial:
        defaultValue: 0.0
        isOptional: true
        parameterType: NUMBER_DOUBLE
      head_ray_num_cpus:
        defaultValue: '0'
        isOptional: true
        parameterType: STRING
      hudi_catalog_name:
        defaultValue: recsys_features
        isOptional: true
        parameterType: STRING
      hudi_warehouse:
        defaultValue: s3a://recsys-offline-feature-store/warehouse
        isOptional: true
        parameterType: STRING
      iceberg_catalog_name:
        defaultValue: recsys_features
        isOptional: true
        parameterType: STRING
      iceberg_warehouse:
        defaultValue: s3a://recsys-offline-feature-store/warehouse
        isOptional: true
        parameterType: STRING
      max_history_len:
        defaultValue: 50.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      max_trials:
        defaultValue: 2.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      num_epochs:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      offline_feature_table:
        defaultValue: recsys_features.feature_store.ml_bst_training
        isOptional: true
        parameterType: STRING
      output_base:
        defaultValue: /workspace/recsys/data_platform/output
        isOptional: true
        parameterType: STRING
      parallel_trials:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      pipeline_run_id:
        defaultValue: manual
        isOptional: true
        parameterType: STRING
      promotion_manifest_path:
        defaultValue: /workspace/recsys/data_platform/output/ml/serving/promotion_manifest.json
        isOptional: true
        parameterType: STRING
      promotion_metric_name:
        defaultValue: test_ndcg_at_10
        isOptional: true
        parameterType: STRING
      pvc_mount_path:
        defaultValue: /workspace
        isOptional: true
        parameterType: STRING
      pvc_name:
        defaultValue: recsys-mlops-pvc
        isOptional: true
        parameterType: STRING
      ray_best_result_path:
        defaultValue: /workspace/recsys/data_platform/output/ml/ray/best_result.json
        isOptional: true
        parameterType: STRING
      ray_image:
        defaultValue: recsys-mlops-training:local
        isOptional: true
        parameterType: STRING
      ray_job_name:
        defaultValue: recsys-bst-ray-tune
        isOptional: true
        parameterType: STRING
      ray_namespace:
        defaultValue: kubeflow
        isOptional: true
        parameterType: STRING
      ray_output_dir:
        defaultValue: /workspace/recsys/data_platform/output/ml/ray
        isOptional: true
        parameterType: STRING
      ray_status_path:
        defaultValue: /workspace/recsys/data_platform/output/ml/ray/rayjob_status.json
        isOptional: true
        parameterType: STRING
      runtime_secret_name:
        defaultValue: recsys-mlops-runtime
        isOptional: true
        parameterType: STRING
      serving_output_dir:
        defaultValue: /workspace/recsys/data_platform/output/ml/serving
        isOptional: true
        parameterType: STRING
      source_run_path:
        defaultValue: apps/data-platform/data-generator/src/output/test_10k_seed42
        isOptional: true
        parameterType: STRING
      split_output_dir:
        defaultValue: /workspace/recsys/data_platform/output/ml/bst_split
        isOptional: true
        parameterType: STRING
      training_percent:
        defaultValue: 0.01
        isOptional: true
        parameterType: NUMBER_DOUBLE
      use_gpu:
        defaultValue: false
        isOptional: true
        parameterType: BOOLEAN
      worker_replicas:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      workspace_root:
        defaultValue: /workspace/recsys
        isOptional: true
        parameterType: STRING
