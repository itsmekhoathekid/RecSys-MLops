pipelineInfo:
  description: Feature engineering, BST training, evaluation, MLflow tracking, MinIO
    artifacts, and Postgres model config.
  name: recsys-bst-feature-train-evaluate
root:
  dag:
    tasks:
      evaluate-bst:
        cachingOptions: {}
        componentRef:
          name: comp-evaluate-bst
        dependentTasks:
        - submit-rayjob-2
        inputs:
          parameters:
            config_path:
              componentInputParameter: bst_config_path
            dataset_metadata_path:
              componentInputParameter: dataset_metadata_path
            metrics_path:
              componentInputParameter: eval_metrics_path
            ray_result_path:
              componentInputParameter: ray_best_result_path
        taskInfo:
          name: evaluate-bst
      prepare-training-data:
        cachingOptions: {}
        componentRef:
          name: comp-prepare-training-data
        inputs:
          parameters:
            dataset_metadata_path:
              componentInputParameter: dataset_metadata_path
            entity_input_path:
              componentInputParameter: entity_input_path
            feast_offline_root:
              componentInputParameter: feast_offline_root
            feast_repo_path:
