name: recsys-dataflow

networks:
  recsys-dataflow:
    driver: bridge

volumes:
  postgres-data:
  airflow-postgres-data:
  minio-data:
  redis-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_FOLDER: /opt/recsys/apps/data-platform/src/orchestration/airflow/dags
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
  PYTHONPATH: /opt/recsys/apps/data-platform/src:/opt/recsys

x-minio-env: &minio-env
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
  AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
  AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
  AWS_DEFAULT_REGION: us-east-1
  LAKE_BUCKET: ${LAKE_BUCKET:-recsys-lakehouse}
  OFFLINE_FEATURE_BUCKET: ${OFFLINE_FEATURE_BUCKET:-recsys-offline-feature-store}
  LAKEHOUSE_WAREHOUSE: ${LAKEHOUSE_WAREHOUSE:-s3a://recsys-lakehouse/warehouse}
  ICEBERG_CATALOG: ${ICEBERG_CATALOG:-recsys}
  ICEBERG_LAKEHOUSE_NAMESPACE: ${ICEBERG_LAKEHOUSE_NAMESPACE:-lakehouse}
  OFFLINE_FEATURE_CATALOG: ${OFFLINE_FEATURE_CATALOG:-recsys_features}
  OFFLINE_FEATURE_STORE_WAREHOUSE: ${OFFLINE_FEATURE_STORE_WAREHOUSE:-s3a://recsys-offline-feature-store/warehouse}
  ICEBERG_FEATURE_NAMESPACE: ${ICEBERG_FEATURE_NAMESPACE:-feature_store}
  OFFLINE_FEATURE_STORE_URI: ${OFFLINE_FEATURE_STORE_URI:-s3a://recsys-offline-feature-store/warehouse/feature_store}

services:
  base-python:
    image: recsys-base-python:local
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.base-python
    command: ["true"]
    networks: [recsys-dataflow]

  postgres:
    image: postgres:16
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=8
      - -c
      - max_wal_senders=8
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recsys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recsys}
      POSTGRES_DB: ${POSTGRES_DB:-recsys}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recsys} -d ${POSTGRES_DB:-recsys}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [recsys-dataflow]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [recsys-dataflow]

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      <<: *minio-env
    entrypoint: ["/bin/sh", "/opt/recsys/infra/docker/scripts/init_minio.sh"]
    volumes:
      - ../..:/opt/recsys
    networks: [recsys-dataflow]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [recsys-dataflow]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks: [recsys-dataflow]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [recsys-dataflow]

  kafka-connect:
    image: recsys-kafka-connect:local
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.kafka-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: recsys-connect
      CONNECT_CONFIG_STORAGE_TOPIC: recsys_connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: recsys_connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: recsys_connect_status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    ports:
      - "${KAFKA_CONNECT_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [recsys-dataflow]

  redis:
    image: redis:latest
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [recsys-dataflow]

  spark-master:
    image: recsys-spark:local
    build:
      context: ../..
      dockerfile: apps/data-platform/Dockerfile.spark
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      <<: *minio-env
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_UI_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [recsys-dataflow]

  spark-worker:
    image: recsys-spark:local
    depends_on:
      spark-master:
        condition: service_healthy
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
    environment:
      <<: *minio-env
    networks: [recsys-dataflow]

  flink-jobmanager:
    image: recsys-flink:local
    build:
      context: ../..
      dockerfile: apps/data-platform/Dockerfile.flink
    command: jobmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
      <<: *minio-env
    ports:
      - "${FLINK_UI_PORT:-8082}:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [recsys-dataflow]

  flink-taskmanager:
    image: recsys-flink:local
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: "jobmanager.rpc.address: flink-jobmanager"
      <<: *minio-env
    networks: [recsys-dataflow]

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [recsys-dataflow]

  airflow-init:
    image: recsys-airflow:local
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.airflow
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      <<: [*airflow-env, *minio-env]
    command: ["bash", "-lc", "airflow db migrate && airflow users create --username admin --password admin --firstname RecSys --lastname Admin --role Admin --email admin@example.com || true"]
    networks: [recsys-dataflow]

  airflow-webserver:
    image: recsys-airflow:local
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    environment:
      <<: [*airflow-env, *minio-env]
    ports:
      - "${AIRFLOW_PORT:-8088}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [recsys-dataflow]

  airflow-scheduler:
    image: recsys-airflow:local
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment:
      <<: [*airflow-env, *minio-env]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [recsys-dataflow]

  dataflow-cli:
    image: recsys-dataflow-cli:local
    build:
      context: ../..
      dockerfile: apps/data-platform/Dockerfile.dataflow-cli
    depends_on:
      base-python:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-connect:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *minio-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-recsys}
      POSTGRES_USER: ${POSTGRES_USER:-recsys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recsys}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CONNECT_URL: http://kafka-connect:8083
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["sleep", "infinity"]
    networks: [recsys-dataflow]
