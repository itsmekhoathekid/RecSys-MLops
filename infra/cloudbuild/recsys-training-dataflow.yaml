substitutions:
  _IMAGE_REPO: asia-southeast1-docker.pkg.dev/fsds-coursework/recsys
  _TAG: gcp
  _SPARK_TAG: full-cicd-20260706-r1

options:
  diskSizeGb: 100
  logging: CLOUD_LOGGING_ONLY

timeout: 3600s

steps:
  - id: base-python
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - infra/docker/Dockerfile.base-python
      - -t
      - ${_IMAGE_REPO}/recsys-base-python:${_TAG}
      - .

  - id: training
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - RECSYS_BASE_IMAGE=${_IMAGE_REPO}/recsys-base-python:${_TAG}
      - -f
      - apps/ml-system/Dockerfile.training
      - -t
      - ${_IMAGE_REPO}/recsys-mlops-training:${_TAG}
      - .

  - id: validate-training-ray-node-selector
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -lc
      - >-
        docker run --rm ${_IMAGE_REPO}/recsys-mlops-training:${_TAG}
        grep -F 'RECSYS_RAY_NODE_SELECTOR' /opt/recsys/apps/ml-system/src/cli/submit_ray_job.py

  - id: dataflow-cli
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - RECSYS_BASE_IMAGE=${_IMAGE_REPO}/recsys-base-python:${_TAG}
      - -f
      - apps/data-platform/Dockerfile.dataflow-cli
      - -t
      - ${_IMAGE_REPO}/recsys-dataflow-cli:${_TAG}
      - .

  - id: validate-dataflow-kfp-package
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -lc
      - >-
        docker run --rm ${_IMAGE_REPO}/recsys-dataflow-cli:${_TAG}
        bash -c "test -f /opt/recsys/infra/kubeflow/compiled/bst_training_pipeline.yaml
        && ! grep -F ':local' /opt/recsys/infra/kubeflow/compiled/bst_training_pipeline.yaml
        && grep -F 'feature_source' /opt/recsys/infra/kubeflow/compiled/bst_training_pipeline.yaml
        && grep -F 'distributed_num_workers' /opt/recsys/infra/kubeflow/compiled/bst_training_pipeline.yaml
        && grep -F 'recsys.ai/pool' /opt/recsys/infra/kubeflow/compiled/bst_training_pipeline.yaml
        && grep -F '${_IMAGE_REPO}/recsys-mlops-training:${_TAG}' /opt/recsys/infra/kubeflow/compiled/bst_training_pipeline.yaml
        && grep -F '${_IMAGE_REPO}/recsys-mlops-spark:${_SPARK_TAG}' /opt/recsys/infra/kubeflow/compiled/bst_training_pipeline.yaml"

images:
  - ${_IMAGE_REPO}/recsys-base-python:${_TAG}
  - ${_IMAGE_REPO}/recsys-mlops-training:${_TAG}
  - ${_IMAGE_REPO}/recsys-dataflow-cli:${_TAG}
