input:
  source: parquet
  run_path: s3a://recsys-lakehouse/warehouse/lakehouse

processing:
  mode: whole_run

output:
  base_path: data_platform/output
  lakehouse_bucket: recsys-lakehouse
  lakehouse_warehouse: s3a://recsys-lakehouse/warehouse
  iceberg_catalog: recsys
  iceberg_lakehouse_namespace: lakehouse
  offline_feature_catalog: recsys_features
  offline_feature_store_warehouse: s3a://recsys-offline-feature-store/warehouse
  iceberg_feature_namespace: feature_store
  offline_feature_store_uri: s3a://recsys-offline-feature-store/warehouse/feature_store
  feast_offline_store_uri: s3a://recsys-offline-feature-store/feast/offline
  feast_postgres_export:
    enabled: true
    host: feature-postgres
    port: 5432
    database: feature_store
    schema: feature_store
    user: feast
    sslmode: disable

features:
  max_history_length: 50
  label_window_hours: 24
  conversion_smoothing_alpha: 1.0
  conversion_smoothing_beta: 10.0
