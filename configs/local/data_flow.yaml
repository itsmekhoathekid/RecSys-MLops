environment: local_native_lakehouse

lakehouse:
  endpoint_url: http://localhost:9000
  bucket: recsys-lakehouse
  warehouse: s3a://recsys-lakehouse/warehouse
  catalog: recsys
  lakehouse_namespace: lakehouse
  raw_prefix: raw

source:
  historical_run_id: test_10k_seed42
  local_generator_output: apps/data-platform/data-generator/src/output/test_10k_seed42
  batch_lakehouse_tables:
    - recsys.lakehouse.users
    - recsys.lakehouse.products
    - recsys.lakehouse.behavior_events
    - recsys.lakehouse.impressions
    - recsys.lakehouse.orders

feature_stores:
  offline_bucket: recsys-offline-feature-store
  offline_catalog: recsys_features
  feature_namespace: feature_store
  offline_uri: s3a://recsys-offline-feature-store/warehouse/feature_store
  online_store: redis

orchestration:
  airflow_dags_path: apps/data-platform/src/orchestration/airflow/dags
